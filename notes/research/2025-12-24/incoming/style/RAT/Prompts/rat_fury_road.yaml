batch:
  name: "RoosterAndTerry-Fury-Road-Xlation"
  project: "RoosterAndTerry"

defaults:
  workflow_template: Templates/Workflows/WAN22/t2v/wan2_2_t2v_base_v1
  width: 576
  height: 1024
  frames: 65
  runs: 2
  t2v_lora_low: rat/rat_v1_wan_low_9250steps.safetensors
  t2v_lora_high: rat/rat_v1_wan_high_4000steps.safetensors
  t2v_steps: 40
  t2v_high_steps: 24
  # t2v_lora_high_strength: 3.0
  teacache:
    start_step: 5
    rel_l1_thresh: 0.15
  negative_prompt: |
    photorealistic, photography, real life, realistic, PBR materials, ray tracing, Unreal Engine,
    complex textures, detailed textures, surface detail, noise texture, grime, grit, dust, rust, weathered, metallic,
    shiny, glossy, polished, reflective, chrome, airbrushed, perfectly smooth, untextured,
    Pixar style, Disney style, generic 3D cartoon, cel shading, toon shading,
    anime style, vector art, thin outlines, 2D animation, flat illustration,
    motion blur, smooth animation, fluid motion, tweening, film grain, lens flare, chromatic aberration,
    worst quality, low quality, jpeg artifacts, blurry, noisy, deformed, disfigured, poor composition,
    bad anatomy, extra limbs, fused fingers, malformed limbs, mutated hands, poorly drawn hands, poorly drawn face,
    text, watermark, signature, logo, UI, border, multiple panels, split screen,
    字幕, 风格, 作品, 画面, 整体发灰, 杂乱的背景

jobs:
  - title: "RAT-Fury-Road-001"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle medium shot of Nux, a bald youth with cracked white body paint and skeletal scars carved into his chest, as he rides on a speeding vehicle. His expression shifts to one of manic, celebratory glee as he sprays his teeth with a can of silver paint, the spray rendered as hand-drawn DOODLED EFFECTS. He then throws both arms wide in a glorious pose, shouting silently at the sky. His features are defined by SCRIBBLED GRAPHITE-LIKE OUTLINES and his skin has ROUGH PAINT-SWATCH TEXTURES. The harsh desert sun is a HIGH-CONTRAST amber key light from above, casting deep shadows on his face filled with CROSS-HATCHING. A pale blue AMBIENT HUE colors the sky, and the background blurs with a SHALLOW DEPTH OF FIELD to emphasize his motion. The shot maintains a slight SIMULATED HANDHELD CAMERA SHAKE throughout.
  - title: "RAT-Fury-Road-001-Xlation"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle medium shot of Nux, a bald youth with cracked white body paint and skeletal scars carved into his chest, rendered as clean graphical details on his form. He begins frozen in a tense pose on a speeding vehicle. In a sudden, sharp POSE-TO-POSE transition, his entire demeanor snaps to one of manic, celebratory glee as he throws both arms wide in a new, glorious held pose. His form, rendered with SMOOTH CLAY-PLASTIC SHADERS, creates a CLEAN SILHOUETTE against a bright blue sky. The scene is lit by a WARM PASTEL PALETTE with a soft bloom effect from a SINGLE LARGE CIRCULAR DISC for the sun. The shot is held in a static frame, emphasizing the triumphant final pose.
  - title: "TMNT-Mad-Max-Supercharger-Crash-Zoom"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle shot focusing on the front of a beat-up, rusty car, its design a chaotic example of ASYMMETRICAL CHARACTER DESIGN. A massive, jury-rigged supercharger is bolted to the hood, and its circular, toothed pulley begins to spin with hyper-energetic speed. The camera executes an aggressive and jarring CRASH ZOOM, slamming into an extreme close-up of the spinning mechanism. The pulley's rapid motion is emphasized by a STUTTERING FRAME RATE and scribbled, hand-drawn motion lines rendered as DOODLED EFFECTS. The car's body is covered in ROUGH PAINT-SWATCH TEXURES, defined by thick SCRIBBLED GRAPHITE-LIKE OUTLINES. A harsh, amber desert sun provides a HIGH-CONTRAST key light, while the shadows are filled with a murky green AMBIENT HUE and deep CROSS-HATCHING.
  - title: "TMNT-Mad-Max-Convoy-Chase-Pole-Launch"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A wide establishing shot of a vast, orange desert under a cloudy sky. In the distance, a chaotic convoy of heavily modified, scrap-metal hot rods and monster trucks kicks up enormous, hand-drawn scribbled dust clouds as they race across the landscape. The vehicles have ROUGH PAINT-SWATCH TEXTURES and are defined by messy, SCRIBBLED GRAPHITE-LIKE OUTLINES. As the convoy speeds along, a lanky daredevil strapped to a tall, swaying pole on one of the lead trucks is launched high into the air in a joyful arc, rendered with a STUTTERING FRAME RATE. The entire scene is lit by a HIGH-CONTRAST amber sun, creating deep shadows filled with CROSS-HATCHING. A pale blue AMBIENT HUE fills the sky. The camera performs a SLOW ZOOM IN on the action, enhancing the sense of a wild, exhilarating road trip.
  - title: "TMNT-Mad-Max-Furiosa-Fierce-Focus"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium close-up of Furiosa, the fierce driver with a shaved head and black grease smeared across her forehead, sitting inside the cab of the massive WAR RIG tanker truck. Her left arm, a mechanical prosthetic built from SCRIBBLED LINEWORK metal components and showing ASYMMETRICAL CHARACTER DESIGN, rests heavily on the steering wheel. Her expression shifts from tense contemplation to fierce, scrappy focus and determination. Her facial features are rendered with SCRIBBLED GRAPHITE-LIKE OUTLINES, and the grease on her forehead is a distinct patch of ROUGH PAINT-SWATCH TEXTURES. HIGH-CONTRAST sunlight through the window casts deep shadows, filled with CROSS-HATCHING, emphasizing her cheekbones. The interior cab is lit with a low, warm amber AMBIENT HUE. Static camera holds on the intensity of her gaze.
  - title: "TMNT-Mad-Max-Polecat-Attack"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A wide shot captures a high-speed vehicular chase across the open desert, with the massive, rust-covered WAR RIG dominating the mid-ground. An acrobatic War Boy, wearing white body paint and ragged cloth, vaults horizontally through the air toward the rig, held by a long, flexible vaulting pole that is stressed into a sharp arc. The vaulting motion is rendered with **EXTREME SMEAR FRAMES** and a **STUTTERING FRAME RATE** to enhance the kinetic feeling of the leap. The figure's edges are defined by **SCRIBBLED LINEWORK** against the vast, textured desert, which is rendered with **ROUGH PAINT-SWATCH TEXTURES**. **HIGH-CONTRAST** sunlight from the right side throws a sharp shadow beneath the War Rig. A dusty orange AMBIENT HUE bathes the scene. A slow TRACKING SHOT moves with the speeding vehicle convoy, using a **SHALLOW DEPTH OF FIELD** to blur the foreground sand.
  - title: "TMNT-Mad-Max-Citadel-Water-Release"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle wide shot establishing the towering CITADEL rock formation, its asymmetrical, tiered surfaces rendered with rough, grey **ROUGH PAINT-SWATCH TEXTURES** and heavy **CROSS-HATCHING** to convey immense weight. Immortan Joe, a grotesque old man with a skeletal respirator mask, stands at the top platform, silhouetted against the bright sky. Below him, jets of water erupt from spigots carved into the rock face. The cascading water is depicted as fluid, transparent blue **DOODLED EFFECTS** mixed with white **SCRIBBLED LINEWORK**, pooling into the foreground where figures are reduced to simple silhouettes. **HIGH-CONTRAST** light from the sun illuminates the cliff face from above. A muted yellow AMBIENT HUE defines the harsh desert atmosphere. The camera holds static, emphasizing the dramatic vertical scale.
  - title: "TMNT-Mad-Max-Doof-Warrior-Anthem"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium wide shot of the COMA-DOOF WARRIOR, a blindfolded figure in a ragged red jumpsuit, bouncing on bungee cords at the front of a monstrous truck made entirely of speakers. With manic energy, he shreds a double-necked electric guitar that periodically erupts, shooting a massive plume of fire into the air. The flame is rendered as a vibrant, hand-drawn burst of orange and yellow **DOODLED EFFECTS**. The entire scene is animated with a **STUTTERING FRAME RATE** to match the wild, percussive music. The warrior's form is defined by sharp **SCRIBBLED GRAPHITE-LIKE OUTLINES**, and the speaker stacks have a worn, grungy texture of **ROUGH PAINT-SWATCH TEXTURES**. The fire acts as a **HIGH-CONTRAST** key light, casting deep, dancing shadows filled with **CROSS-HATCHING**. A slow, dynamic TRACKING SHOT moves alongside the vehicle, capturing the raw energy of the performance.
  - title: "TMNT-Mad-Max-Vuvalini-Last-Stand"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium shot of the KEEPER OF THE SEEDS, an elderly warrior woman with long white hair and desert goggles, as she takes aim from the back of a speeding motorcycle. With the steady hands of a veteran, she sights down the long barrel of a vintage rifle, her expression one of gritty, unwavering focus. Her wrinkled face is a network of expressive **SCRIBBLED LINEWORK**, and her layered desert wraps are rendered with faded **ROUGH PAINT-SWATCH TEXTURES**. The harsh desert sun is a direct key light from the side, creating **HIGH-CONTRAST** light on one side of her face and deep shadows filled with **CROSS-HATCHING** on the other. **SHALLOW DEPTH OF FIELD** blurs the chaotic chase behind her, isolating her moment of concentration. The camera tracks with her bike, maintaining a slight **SIMULATED HANDHELD CAMERA SHAKE**.
  - title: "TMNT-Mad-Max-Max-Claustrophobic-Escape"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A tight, Dutch-angled close-up on Max, a captured man with a crude, cage-like metal muzzle bolted around his face and connected to a chain. He struggles against his bonds in a narrow rock corridor, his movements sharp and desperate. The muzzle is a complex lattice of **SCRIBBLED GRAPHITE-LIKE OUTLINES**, showing imperfect welds and scrapes. A single, harsh shaft of light from above acts as the key light, casting the rest of his face and the background into deep blackness filled with dense **CROSS-HATCHING**. The texture of the rock wall behind him is a gritty canvas of **ROUGH PAINT-SWATCH TEXTURES**. The camera is static but tilted, enhancing the feeling of claustrophobia and disorientation as he pulls against the chain with a visible, shuddering effort.
  - title: "TMNT-Mad-Max-Chain-Struggle"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium shot focusing on the central struggle between Max, a scarred man in a leather harness, and Furiosa, the woman with the severe crew cut and a metallic prosthetic arm. They are physically linked by a thick, heavy metal chain, rendered with bold SCRIBBLED GRAPHITE‑LIKE OUTLINES. The two figures are caught in the dust, tumbling and pulling against the chain with movements characterized by a noticeable STUTTERING FRAME RATE and stiff, jerky joint pivots. They exchange a look of awkward, exasperated disbelief, rather than pure rage. Their clothing and the desert ground are defined by rough, brown ROUGH PAINT‑SWATCH TEXTURES. Plumes of kicked‑up dust are depicted as opaque PAINTED SMOKE PLUMES. The static camera observes the chaotic, intertwined action. HIGH‑CONTRAST sunlight from the top left, with a pale yellow AMBIENT HUE coloring the dusty air, and deep CROSS‑HATCHING in the folds of their clothing.
  - title: "TMNT-Mad-Max-Doof-Warrior-Speaker-Rig"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low‑angle wide shot establishing a massive speaker rig built onto a rust‑colored, ASYMMETRICAL CHARACTER DESIGN vehicle, speeding across a vast, gritty desert. Perched high atop the rig is the Doof Warrior, a figure in a simple red union suit playing a massive double‑necked electric guitar. The Warrior's face is rendered with SCRIBBLED GRAPHITE‑LIKE OUTLINES and contorted into an exaggerated, maniacal grin, embodying chaotic performance. Flames erupt silently from the guitar neck, rendered as red and orange hand‑drawn DOODLED EFFECTS that trail behind the rig. The red suit and the desert floor are covered in ROUGH PAINT‑SWATCH TEXTURES. Heavy CROSS‑HATCHING defines the shadows beneath the massive speakers. The scene maintains a slight SIMULATED HANDHELD CAMERA SHAKE throughout, emphasizing the kinetic energy. HIGH‑CONTRAST light from the explosion of fire, with a dark, warm red AMBIENT HUE filling the scene.
  - title: "TMNT-Mad-Max-Blood-Bag"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A wide tracking shot of a V8 pursuit vehicle, a heavily modified car covered in rust and dust, as it speeds across the desert. Strapped vertically to the front like a hood ornament is MAX, a captured man with a shaved head and a metal cage-muzzle, serving as a living BLOOD BAG via a tube running from his arm to the driver. The vehicle's rusty chassis is rendered with flaky **ROUGH PAINT-SWATCH TEXTURES**, and its sharp edges are defined by aggressive **SCRIBBLED LINEWORK**. Max's unconscious form is an example of **ASYMMETRICAL CHARACTER DESIGN**, limp and rag-dolled. **HIGH-CONTRAST** desert sun glints off the chrome engine parts, casting deep shadows filled with **CROSS-HATCHING** underneath the car. The camera moves parallel to the car, maintaining a slight **SIMULATED HANDHELD CAMERA SHAKE** to emphasize the bumpy, chaotic ride.
  - title: "TMNT-Mad-Max-Angharad-Defiance"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium shot of SPLENDID ANGHARAD, a young woman in flowing white cloth wraps, as she stands defiantly on the open side-door of the speeding WAR RIG. Heavily pregnant, she positions her body as a shield, glaring with fierce, unwavering eyes at an approaching vehicle. Her blonde hair and the edges of her white wraps whip wildly in the wind, animated with expressive **SCRIBBLED LINEWORK**. The weathered green metal of the truck door behind her has visible **ROUGH PAINT-SWATCH TEXTURES**. The direct sunlight creates **HIGH-CONTRAST** lighting that makes her white wraps almost glow, while casting a sharp shadow filled with **CROSS-HATCHING** beside her. The camera executes a slow, deliberate push-in, heightening the tension and focusing entirely on her powerful, challenging expression.
  - title: "TMNT-Mad-Max-Desolate-Green-Place"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle wide shot establishes the GREEN PLACE at night, revealed to be a desolate, murky swamp. Skeletal dead trees, rendered with sharp **SCRIBBLED GRAPHITE-LIKE OUTLINES**, rise from a thick, muddy ground made of dark, swirling **ROUGH PAINT-SWATCH TEXTURES**. In the mid-ground, several gaunt, crow-like figures on impossibly tall stilts wade slowly through the muck, their forms silhouetted against the fog. The only key light is the cool, silver moonlight from above, casting long, distorted shadows everywhere. The entire scene is bathed in a deep, sickly green **AMBIENT HUE**. The camera remains static, allowing the eerie, handcrafted beauty of the desolate landscape to create a powerful, unsettling mood.
  # - title: "TMNT-Mad-Max-Wives-Cleansing"
  #   prompt: |
  #     Clay-Plastic Pose-to-Pose Animation — A medium wide shot of the FIVE WIVES, a group of young White women in flowing white cloth wraps, gathered on the side of the massive, rust-colored WAR RIG. One of them joyfully sprays the others with a large water hose, their faces showing pure, rebellious exhilaration. The water is rendered as a spray of translucent blue **DOODLED EFFECTS** and sharp **SCRIBBLED LINEWORK** that splashes across their clothes and skin. Their white wraps, made with tangible **ROUGH PAINT-SWATCH TEXTURES**, become semi-transparent where soaked. The scene is lit by **HIGH-CONTRAST** desert sun, making the individual water droplets sparkle as they fly through the air. Deep shadows with heavy **CROSS-HATCHING** are cast on the truck's metal plating behind them. The camera is static, capturing a stolen, candid moment of chaotic freedom.
  # - title: "TMNT-Mad-Max-Wives-Cleansing-2"
  #   prompt: |
  #     Clay-Plastic Pose-to-Pose Animation — A medium wide shot of the FIVE WIVES, a group of young White women in flowing white cloth wraps, rendered with expressive BRUSH-PEN OUTLINES and ROUGH PAINT-SWATCH TEXTURES, gathered on the side of the massive WAR RIG. One of them joyfully sprays the others with a large water hose, their faces showing pure, rebellious exhilaration. The water is rendered as a spray of translucent blue DOODLED EFFECTS and sharp SCRIBBLED LINEWORK that splashes their clothes and skin. Their flowing white wraps are rendered with flat ACRYLIC GOUACHE BLOCK-IN, become semi-transparent where soaked. The truck's rusted metal has a weathered DRY-BRUSH TEXTURE. The scene is lit by HARSH DIRECT amber sunlight from above as the key light; a pale blue AMBIENT HUE fills the sky; shadows read as POSTERIZED SHADOW SHAPES. The camera is static, capturing a stolen, candid moment of chaotic freedom. Style Cues: LINE BOIL, GRAPHITE GRAIN, CEL DUST, ON TWOS, WATERCOLOR BLOOM
  - title: "TMNT-Mad-Max-Rictus-Roar"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle medium shot of RICTUS ERECTUS, a towering, muscular man-child with a blonde mohawk and a complex breathing apparatus over his mouth. He throws his head back and lets out a silent, frustrated roar, his face a perfect mask of a teenager having a tantrum. His **ASYMMETRICAL CHARACTER DESIGN** is emphasized by the massive V8 engine block chained to his back. His pale skin is rendered with fleshy **ROUGH PAINT-SWATCH TEXTURES**, and the bulging muscles of his neck and shoulders are defined by thick **SCRIBBLED GRAPHITE-LIKE OUTLINES**. The harsh desert sun creates **HIGH-CONTRAST** highlights on his shoulders and casts deep shadows with dense **CROSS-HATCHING** across his chest. **SHALLOW DEPTH OF FIELD** blurs the chaotic background, focusing entirely on his oversized emotional outburst.
  - title: "TMNT-Mad-Max-Max-Haunting-Vision"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A tight, claustrophobic close-up on the face of Max, a weary man with a haunted expression, inside the dark cab of a truck at night. He flinches as, for a split second, the ghostly image of a young girl's face appears over his own, rendered as a flickering, hand-drawn **DOODLED EFFECT** with white **SCRIBBLED LINEWORK**. The apparition is animated with a jarring **STUTTERING FRAME RATE**, appearing and vanishing in just a few frames like a glitchy transmission. Max's face is heavily shadowed, with deep **CROSS-HATCHING** around his exhausted eyes. A faint, cool blue **AMBIENT HUE** from the dashboard provides the only light, creating soft highlights on the **ROUGH PAINT-SWATCH TEXTURES** of his skin. The camera remains static and uncomfortably close.
  - title: "TMNT-Mad-Max-Bullet-Farmer-Fury"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle medium shot of the BULLET FARMER, a large, heavy-set man with his eyes wrapped in bloody bandages and a bandolier of bullets strapped across his bare chest. He stands atop his vehicle and fires two machine pistols wildly into the dark, foggy swamp. Each muzzle flash is a brilliant, star-shaped burst of yellow and white **DOODLED EFFECTS** that briefly illuminates his form in **HIGH-CONTRAST**. The rest of the scene is plunged into darkness filled with deep **CROSS-HATCHING**. His skin and the thick fog are rendered with swirling **ROUGH PAINT-SWATCH TEXTURES**, and his guns are defined by sharp **SCRIBBLED LINEWORK**. A cool blue **AMBIENT HUE** permeates the fog between shots. The camera remains static, capturing the chaotic strobe effect of the gunfire.
  - title: "TMNT-Mad-Max-Nux-Final-Witness"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A wide shot of the massive, rust-covered WAR RIG as it speeds through a narrow rock canyon. With a deliberate, final act, the truck jackknifes violently, slamming its trailer into the canyon wall in a massive explosion of grinding metal and dust. The impact is rendered with a flash of white IMPACT FRAMES and a huge cloud of dust made from OPAQUE PAINTED SMOKE PLUMES and scraggly **SCRIBBLED LINEWORK**. The towering canyon walls are sheer faces of **ROUGH PAINT-SWATCH TEXTURES**, with heavy **CROSS-HATCHING** in the deep shadows. The **HIGH-CONTRAST** desert sun from above casts sharp, dark shadows into the canyon. The camera is locked-off, a silent witness to the heroic, final crash.
  - title: "TMNT-Mad-Max-Max-Disappears"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — An eye-level medium shot of Max, a weary man in a scuffed leather jacket, standing amidst a dense, cheering crowd on a rising platform. He holds the gaze of someone off-screen for a long moment, then gives a single, final, knowing nod. He turns his back to the camera and is immediately swallowed by the sea of people, vanishing from sight. The crowd is a dense collage of pale faces and waving hands, rendered with expressive but simplified **SCRIBBLED LINEWORK**. Max's jacket has a cracked, worn texture of **ROUGH PAINT-SWATCH TEXTURES**. Soft, diffused overhead light casts gentle shadows, with light **CROSS-HATCHING** to add depth to the crowd. A slow push-in from a **SIMULATED HANDHELD CAMERA** follows him until he disappears, then holds on the now-empty space.