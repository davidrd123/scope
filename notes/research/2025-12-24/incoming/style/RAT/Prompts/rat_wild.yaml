batch:
  name: "RoosterAndTerry-Wild"
  project: "RoosterAndTerry"

defaults:
  workflow_template: Templates/Workflows/WAN22/t2v/wan2_2_t2v_base_v1
  width: 576
  height: 1024
  frames: 33
  runs: 1
  t2v_lora_low: rat/rat_v1_wan_low_9250steps.safetensors
  t2v_lora_high: rat/rat_v1_wan_high_3250steps.safetensors
  t2v_steps: 24
  t2v_high_steps: 12
  # t2v_lora_high_strength: 3.0
  teacache:
    start_step: 5
    rel_l1_thresh: 0.155
  negative_prompt: |
    photorealistic, photography, real life, realistic, PBR materials, ray tracing, Unreal Engine,
    complex textures, detailed textures, surface detail, noise texture, grime, grit, dust, rust, weathered, metallic,
    shiny, glossy, polished, reflective, chrome, airbrushed, perfectly smooth, untextured,
    Pixar style, Disney style, generic 3D cartoon, cel shading, toon shading,
    anime style, vector art, thin outlines, 2D animation, flat illustration,
    motion blur, smooth animation, fluid motion, tweening, film grain, lens flare, chromatic aberration,
    worst quality, low quality, jpeg artifacts, blurry, noisy, deformed, disfigured, poor composition,
    bad anatomy, extra limbs, fused fingers, malformed limbs, mutated hands, poorly drawn hands, poorly drawn face,
    text, watermark, signature, logo, UI, border, multiple panels, split screen,
    字幕, 风格, 作品, 画面, 整体发灰, 杂乱的背景
jobs:
  # - title: "RAT-Wild-MudCollector"
  #   prompt: |
  #     Clay-Plastic Pose-to-Pose Animation — A medium shot of a strange creature, the Mud Collector, rising from a puddle on Wobbly Willow Farm. Its body is a single, flowing form of dark, goopy slime, rendered with a SMOOTH CLAY-PLASTIC SHADER and a high-gloss SEMI-GLOSS SHEEN. From its amorphous head emerge multiple simple, white, mask-like faces of other farm animals—a blocky pig, a rounded sheep, and a zany duck—each with a CLEAN SILHOUETTE. The creature is frozen in a held POSE-TO-POSE frame, dripping slightly. The scene is lit by a soft, warm key light from a SINGLE LARGE CIRCULAR DISC; a pale cream AMBIENT HUE fills the sky; shadows read as SOFT POSTERIZED SHADOW SHAPES. Style Cues: ON TWOS, POP-IN HOLDS, CHUNKY CONTOUR LINES, GRAPHIC FLATTENING.
  # - title: "RAT-Wild-FieldTotem"
  #   prompt: |
  #     Clay-Plastic Pose-to-Pose Animation — A low-angle shot of a strange stone golem, the Field Totem, standing motionless in a cornfield on Wobbly Willow Farm. Its body is composed of interlocking, blocky gray stone shapes with a rough MATTE FINISH, suggesting SIMPLIFIED GRAPHIC GEOMETRY. Atop its thick neck sits a cluster of multiple carved heads, each with a different simple, theatrical expression: one smiling, one frowning, one sleeping. The entire figure holds a static, weathered POSE-TO-POSE stance. The scene is lit by a soft, warm key light from a SINGLE LARGE CIRCULAR DISC; a pale blue AMBIENT HUE fills the sky; shadows read as SOFT POSTERIZED SHADOW SHAPES cast by the corn stalks. Style Cues: ON TWOS, GRAPHIC FLATTENING, BOLD SHAPE DESIGN, SUBTLE MOLD LINES.
  # - title: "RAT-Wild-CreekTender"
  #   prompt: |
  #     Clay-Plastic Pose-to-Pose Animation — A medium shot of a forgotten scarecrow, the Creek Tender, crouching by a stream on Wobbly Willow Farm. Its body is made of weathered wood rendered with SMOOTH CLAY-PLASTIC SHADERS, but its surface is covered in a network of fine, dark CHUNKY CONTOUR LINES suggesting cracks and age. It is frozen in a gentle POSE-TO-POSE hold, its long, thin fingers carefully arranging several small, featureless, white clay figures in the shallow water. The scene is lit by a soft, warm key light from a SINGLE LARGE CIRCULAR DISC; a pale cream AMBIENT HUE fills the sky; shadows from the nearby willow tree read as SOFT POSTERIZED SHADOW SHAPES. Style Cues: ON TWOS, PENCIL PRESSURE VARIATION, ASYMMETRICAL KITBASHED DETAILS, POP-IN HOLDS.
  # - title: "RAT-Wild-SunflowerWatcher"
  #   prompt: |
  #     Clay-Plastic Pose-to-Pose Animation — A wide shot of a strange creature, the Sunflower Watcher, standing in front of the bright red barn at Wobbly Willow Farm. Its body is made of tangled, smooth, brown roots rendered with SMOOTH CLAY-PLASTIC SHADERS. Its head is a cluster of long, curving green stalks, and each stalk ends in a stylized, wide-open sunflower. The dark center of each sunflower is a single, large, unblinking white eye, giving it a bewildered expression. The creature is frozen in a curious POSE-TO-POSE stance. The scene is lit by a soft, warm key light from a SINGLE LARGE CIRCULAR DISC; a pale blue AMBIENT HUE fills the sky; shadows read as SOFT POSTERIZED SHADOW SHAPES. Style Cues: ON TWOS, BOLD SHAPE DESIGN, GRAPHIC FLATTENING, CHUNKY CONTOUR LINES.
  # - title: "RAT-Wild-SlimeMasks"
  #   prompt: |
  #     Clay-Plastic Pose-to-Pose Animation — A medium shot of a strange creature standing in a field at Wobbly Willow Farm. Its body is an amorphous, dripping mass of dark green slime, rendered with a SMOOTH CLAY-PLASTIC SHADER and a high-gloss POLISHED PLASTIC REFLECTION to appear wet. Emerging from the top of this form is a cluster of simple, theatrical masks with a MATTE FINISH: four are stark white, one is a solid magenta. Each mask has a different carved expression—a wide grin, a smug smirk, a neutral stare—and features solid red dots for eyes. The creature is frozen in a static POSE-TO-POSE hold, with a few rounded drips of slime hanging in mid-air. The scene is lit by a soft, warm key light from a SINGLE LARGE CIRCULAR DISC; a pale blue AMBIENT HUE fills the sky; shadows read as SOFT POSTERIZED SHADOW SHAPES. Style Cues: ON TWOS, BOLD SHAPE DESIGN, CHUNKY CONTOUR LINES, GRAPHIC FLATTENING.
  - title: "RAT-Wild-MultiHeadGolem"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle shot of a tall golem doing a ridiculous funky dance on a rolling green hill at Wobbly Willow Farm. Its dark indigo body is rendered with SMOOTH CLAY-PLASTIC SHADERS, its powerful musculature simplified into BOLD SHAPE DESIGN. Atop its neck, a totem-like stack of six solid white heads with MATTE FINISH bounces and bobs with each dance move. In an absurd POSE-TO-POSE sequence, the golem strikes three distinct dance poses: arms thrown wide, then one hip jutted out, then both fists pumped overhead. As it dances, all six heads wobble independently on their blocky joints, each maintaining a different theatrical expression—grinning, frowning, surprised—while their simple red circular eye-lenses remain fixed forward. The figure maintains exaggerated CLEAN SILHOUETTES through each pose change. The scene is lit by a WARM PASTEL PALETTE with soft diffuse light from a SINGLE LARGE CIRCULAR DISC.
  - title: "RAT-Wild-CrackedPuppet"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium shot of a slender, puppet-like being crouching in a shallow stream at Wobbly Willow Farm. Its body and long, thin limbs are a pale, bone-white color with a MATTE FINISH, rendered with SMOOTH CLAY-PLASTIC SHADERS. Its entire surface is covered in a dense network of thin, black CHUNKY CONTOUR LINES, giving it the appearance of cracked porcelain or wood. It wears a simple, dark blue wide-brimmed hat and cloak, rendered as a single piece of BOLD SHAPE DESIGN. It is frozen in a contemplative POSE-TO-POSE hold, its delicate hands hovering over several small, featureless, white clay figures that sit in the water. The scene is keyed by cool, magenta moonlight; immersed in a deep indigo AMBIENT HUE; figures flatten into EXAGGERATED SILHOUETTES against pools of INK WASH SHADOWS. Style Cues: ON TWOS, POP-IN HOLDS, PENCIL PRESSURE VARIATION, EXAGGERATED SILHOUETTES.
  - title: "RAT-Wild-EyestalkMask"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium close-up of a bizarre creature standing in front of the bright red barn at Wobbly Willow Farm. It wears a simple, tattered white tunic with clean, graphic holes. Its head is a smooth, featureless white mask with a MATTE FINISH, from which sprout ten long, flexible green stalks, each ending in a single, large, unblinking cartoon eyeball. The eyestalks are frozen in a dynamic POSE-TO-POSE hold, pointing in various directions with a look of collective surprise. The creature's visible skin is a pale, bone-white color covered in fine, dark CHUNKY CONTOUR LINES that suggest cracks. The scene is lit by a soft, warm key light from a SINGLE LARGE CIRCULAR DISC; a pale blue AMBIENT HUE fills the sky; shadows read as SOFT POSTERIZED SHADOW SHAPES. Style Cues: ON TWOS, BOLD SHAPE DESIGN, CLEAN SILHOUETTES, GRAPHIC FLATTENING.
  - title: "RAT-Wild-EyeShepherd"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle medium shot of the Eye Shepherd standing in a misty field at Wobbly Willow Farm. The figure wears a simple, flowing robe rendered in deep purple with SMOOTH CLAY-PLASTIC SHADERS. Its head is replaced by a single massive eyeball, three times normal head size, with a vibrant blue iris and glossy SEMI-GLOSS SHEEN. Orbiting this central eye are six smaller eyeballs on thin, curved stalks, each frozen in a gentle rotating POSE-TO-POSE hold. The figure stands motionless with its arms hidden in its robes, maintaining a CLEAN SILHOUETTE against the pale sky. The scene is lit by a COOL SATURATED PALETTE with soft magenta RIM LIGHTING defining each eye's form. Style Cues: ON TWOS, BOLD SHAPE DESIGN, SIMPLIFIED GRAPHIC GEOMETRY.
  - title: "RAT-Wild-SpiralWitness"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium shot of the Spiral Witness standing at the edge of the duck pond at Wobbly Willow Farm. The figure wears a simple grey robe with MATTE FINISH and SIMPLIFIED GRAPHIC GEOMETRY. Its head is replaced by a perfectly circular flat disc facing forward, rendered in stark black and white with a hypnotic spiral pattern carved into its surface. The spiral creates an unsettling focal point with BOLD SHAPE DESIGN. The figure holds a strong, static POSE-TO-POSE stance, arms at its sides. The scene is rendered with SMOOTH CLAY-PLASTIC SHADERS and lit by a WARM PASTEL PALETTE with soft diffuse light from a SINGLE LARGE CIRCULAR DISC sun, creating gentle POSTERIZED SHADOW SHAPES on the ground. Style Cues: ON TWOS, CLEAN SILHOUETTES, GRAPHIC FLATTENING.
  - title: "RAT-Wild-CrownOfHands"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle shot of the Crown of Hands standing on a grassy hill at Wobbly Willow Farm. The figure has a simple, robed body rendered in dark blue with SMOOTH CLAY-PLASTIC SHADERS. Radiating from its head like a crown are eight disembodied hands, each rendered with clean, toy-like fingers and frozen in different gestures—pointing upward, grasping at air, palm open in blessing, fist clenched. Each hand maintains a CLEAN SILHOUETTE against the sky with BOLD SHAPE DESIGN. The figure stands in a contemplative POSE-TO-POSE hold, its faceless head tilted slightly upward. The scene is lit by a COOL SATURATED PALETTE with a deep indigo sky and strong RIM LIGHTING highlighting each hand's edges. Style Cues: ON TWOS, SIMPLIFIED GRAPHIC GEOMETRY, POSTERIZED SHADOW SHAPES.
  - title: "RAT-Wild-RootCaller"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A wide shot of the Root Caller emerging from behind the red barn at Wobbly Willow Farm. The figure is a tall, vaguely humanoid form composed of fifteen thick, smooth tentacles or roots bundled together, each rendered with SMOOTH CLAY-PLASTIC SHADERS in earthy brown tones. The tendrils are bound at chest and waist, creating a readable silhouette. Near the top of the mass, two deep circular voids suggest eyes, maintaining SIMPLIFIED GRAPHIC GEOMETRY. The figure holds a slow, deliberate POSE-TO-POSE stance, several root-tips touching the ground. The scene is rendered with a WARM PASTEL PALETTE under soft daylight from a SINGLE LARGE CIRCULAR DISC, casting gentle POSTERIZED SHADOW SHAPES. Style Cues: ON TWOS, CLEAN SILHOUETTES, BOLD SHAPE DESIGN, MATTE FINISH.
  - title: "RAT-Wild-HollowProphet"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium shot of the Hollow Prophet walking slowly across a field at Wobbly Willow Farm. The figure is tall and robed in pale cream fabric with SMOOTH CLAY-PLASTIC SHADERS. Through its torso is a perfectly circular void, cut clean through from front to back—the bright blue sky and distant barn are clearly visible through the hole. The void's edges are smooth and rounded, creating an unsettling portal effect with BOLD SHAPE DESIGN. The figure's head is a simple, featureless oval with two dark eye-dots. It moves in a slow POSE-TO-POSE walk, arms hidden in its robes, maintaining a CLEAN SILHOUETTE. The scene is lit by a WARM PASTEL PALETTE with soft bloom from a SINGLE LARGE CIRCULAR DISC sun. Style Cues: ON TWOS, SIMPLIFIED GRAPHIC GEOMETRY, POSTERIZED SHADOW SHAPES.
  - title: "RAT-Wild-TriangleSeer"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle medium shot of the Triangle Seer standing at the farm gate at Wobbly Willow Farm. The figure wears a long, flowing robe in deep teal with SMOOTH CLAY-PLASTIC SHADERS and a MATTE FINISH. Its head is replaced by a simple equilateral triangle with point facing upward, rendered as a solid geometric shape with BOLD SHAPE DESIGN. At each corner of the triangle sits a single glowing eye with SEMI-GLOSS SHEEN—one golden, one green, one purple. The figure holds a prophet-like POSE-TO-POSE stance with arms outstretched. The scene is rendered in a COOL SATURATED PALETTE under a twilight sky, with strong magenta RIM LIGHTING defining the triangle's sharp edges and creating dramatic POSTERIZED SHADOW SHAPES. Style Cues: ON TWOS, CLEAN SILHOUETTES, SIMPLIFIED GRAPHIC GEOMETRY.
  - title: "RAT-Wild-BellWatcher"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium close-up of the Bell Watcher standing near the old willow tree at Wobbly Willow Farm. The figure wears a simple, weathered robe in grey-green with SMOOTH CLAY-PLASTIC SHADERS. Its entire head is replaced by a large, upside-down bell shape rendered in tarnished bronze with a MATTE FINISH and subtle green patina. Through the bell's opening at the bottom, a single large eye peers out, unblinking and watchful, with a glossy SEMI-GLOSS SHEEN. The figure is frozen in a still, observant POSE-TO-POSE hold with hands clasped. The scene maintains a CLEAN SILHOUETTE and is lit by a WARM PASTEL PALETTE with soft, diffuse light creating gentle POSTERIZED SHADOW SHAPES beneath the willow. Style Cues: ON TWOS, BOLD SHAPE DESIGN, SIMPLIFIED GRAPHIC GEOMETRY.
  - title: "RAT-Wild-MoonKeeper"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A wide shot of the Moon Keeper standing alone in a field under the night sky at Wobbly Willow Farm. The figure has a simple, faceless body rendered in midnight blue with SMOOTH CLAY-PLASTIC SHADERS. Partially embedded into its chest is a large crescent moon shape, glowing softly with a pale white SEMI-GLOSS SHEEN and gentle bloom effect. The figure cradles the moon with both arms in a protective embrace, frozen in a contemplative POSE-TO-POSE hold. Its CLEAN SILHOUETTE is sharply defined against the deep indigo sky. The scene is rendered in a COOL SATURATED PALETTE with strong cyan RIM LIGHTING highlighting the figure's edges and casting long POSTERIZED SHADOW SHAPES across the grass. Style Cues: ON TWOS, BOLD SHAPE DESIGN, SIMPLIFIED GRAPHIC GEOMETRY, GRAPHIC FLATTENING.
  - title: "RAT-Wild-PendulumHead"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium shot of the Pendulum Head standing at the farm gate at Wobbly Willow Farm. The figure wears a long grey robe rendered with SMOOTH CLAY-PLASTIC SHADERS and SIMPLIFIED GRAPHIC GEOMETRY. Its head hangs from an impossibly long, curved neck that swings in a slow POSE-TO-POSE arc from left to right like a pendulum. The head is a simple oval with two large, unblinking eyes that track directly at the viewer throughout the swing, creating an unsettling focal point with BOLD SHAPE DESIGN. The figure's body remains perfectly still with a CLEAN SILHOUETTE while only the head moves. The scene is lit by a WARM PASTEL PALETTE with soft diffuse light from a SINGLE LARGE CIRCULAR DISC, casting a moving shadow beneath the swinging head.
  - title: "RAT-Wild-UnwindingScarecrow"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A wide shot of the Unwinding Scarecrow walking slowly across a field at Wobbly Willow Farm. The figure is a traditional scarecrow with a burlap head and tattered clothes rendered with SMOOTH CLAY-PLASTIC SHADERS. As it takes three deliberate POSE-TO-POSE steps forward, straw from its body continuously unravels into a perfect spiral trail behind it, growing longer with each step. The spiral is rendered with clean, graphic curves and BOLD SHAPE DESIGN. The figure maintains a CLEAN SILHOUETTE despite the transformation, its arms outstretched in classic scarecrow pose. The scene is lit by a WARM PASTEL PALETTE with soft bloom from a SINGLE LARGE CIRCULAR DISC, creating gentle shadows through the golden straw spiral.
  - title: "RAT-Wild-CompassRose"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle shot of the Compass Rose standing on a grassy hill at Wobbly Willow Farm. The figure has a cylindrical torso rendered in deep teal with SMOOTH CLAY-PLASTIC SHADERS and four arms extending outward in perfect cardinal directions—north, south, east, west. Each arm ends in a pointing hand with SIMPLIFIED GRAPHIC GEOMETRY. In a single sharp POSE-TO-POSE snap, the entire upper body rotates exactly 90 degrees clockwise, the arms maintaining their compass orientation so each now points to a new direction. The figure's featureless head remains forward-facing throughout, creating an unsettling disconnect. The scene maintains CLEAN SILHOUETTES and is lit by a WARM PASTEL PALETTE with soft diffuse light creating crisp shadows.
  - title: "RAT-Wild-LanternBearer"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium shot of the Lantern Bearer walking along a path at Wobbly Willow Farm at dusk. The figure is a tall, robed form rendered in dark purple with SMOOTH CLAY-PLASTIC SHADERS, but where its head should be, its neck ends in a large brass lantern with MATTE FINISH. As the figure walks in a slow POSE-TO-POSE gait, the lantern swings forward and back like a pendulum with each step. Inside the lantern, a warm orange flame flickers, creating moving POSTERIZED SHADOW SHAPES that sweep across the ground with BOLD SHAPE DESIGN. The figure maintains a CLEAN SILHOUETTE against the twilight sky. The scene is lit by a COOL SATURATED PALETTE with the lantern providing the primary warm key light.
  - title: "RAT-Wild-RecursiveWitness"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium close-up of the Recursive Witness standing in a field at Wobbly Willow Farm. The figure wears a simple blue robe rendered with SMOOTH CLAY-PLASTIC SHADERS and holds a perfect smaller copy of itself, which in turn holds an even smaller copy—three levels deep, each one-third the scale. All three figures are identical with SIMPLIFIED GRAPHIC GEOMETRY and CLEAN SILHOUETTES. The largest figure and middle figure remain perfectly still, but in a subtle POSE-TO-POSE movement, the smallest figure's head slowly turns to look directly at the viewer, its tiny eyes creating an unsettling focal point. The scene is lit by a WARM PASTEL PALETTE with soft diffuse light from a SINGLE LARGE CIRCULAR DISC creating gentle nested shadows.
  - title: "RAT-Wild-StringWalker"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle medium shot of the String Walker, a farmer figure crossing a field at Wobbly Willow Farm. The figure wears overalls and a straw hat, rendered with SMOOTH CLAY-PLASTIC SHADERS and BOLD SHAPE DESIGN. From its wrists, elbows, knees, and head extend thin, taut strings upward into the empty blue sky, disappearing from frame. As it takes three POSE-TO-POSE steps forward, the strings pull tight and then slack with each movement, controlling its gait like a marionette. The figure maintains a CLEAN SILHOUETTE, the strings rendered as simple dark lines with SIMPLIFIED GRAPHIC GEOMETRY. The scene is lit by a WARM PASTEL PALETTE with soft bloom from a SINGLE LARGE CIRCULAR DISC.
  - title: "RAT-Wild-TurningOne"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium shot of the Turning One standing at the duck pond at Wobbly Willow Farm. The figure appears as a simple farmer in blue overalls with SMOOTH CLAY-PLASTIC SHADERS and a CLEAN SILHOUETTE. In a slow, unsettling POSE-TO-POSE rotation, its upper torso completes a full 360-degree turn while its legs and hips remain completely stationary and facing forward. Throughout the rotation, its head tracks forward toward the viewer, maintaining eye contact the entire time with BOLD SHAPE DESIGN. The impossible anatomy is clearly visible at the 180-degree point when the torso faces backward. The scene is lit by a WARM PASTEL PALETTE with soft diffuse light creating shifting shadows as the body turns.
  - title: "RAT-Wild-BloomHead"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium close-up of the Bloom Head standing near the red barn at Wobbly Willow Farm. The figure wears a simple green gardening robe rendered with SMOOTH CLAY-PLASTIC SHADERS. Where its head should be sits a large closed flower bud, rendered as a cluster of overlapping petals in soft pink with MATTE FINISH and SIMPLIFIED GRAPHIC GEOMETRY. In a slow POSE-TO-POSE unfold, the petals peel back one by one, revealing a cluster of five unblinking eyes arranged in a circle inside, each eye a different color with glossy SEMI-GLOSS SHEEN. The figure maintains a CLEAN SILHOUETTE throughout the bloom. The scene is lit by a WARM PASTEL PALETTE with soft diffuse light from a SINGLE LARGE CIRCULAR DISC.
  - title: "RAT-Wild-ShadowMismatch"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A wide shot of the Shadow Mismatch, a normal-looking farmer pig standing perfectly still in a field at Wobbly Willow Farm. The pig is rendered with SMOOTH CLAY-PLASTIC SHADERS, wearing simple overalls and maintaining a CLEAN SILHOUETTE with arms at its sides in a static pose. However, its shadow cast on the ground is in a completely different pose—waving enthusiastically with both arms raised. The shadow is rendered as a flat, dark shape with BOLD SHAPE DESIGN and SIMPLIFIED GRAPHIC GEOMETRY. As the shot holds, the shadow's wave completes one full cycle while the pig remains motionless, creating deep unease. The scene is lit by a WARM PASTEL PALETTE with strong directional light from a SINGLE LARGE CIRCULAR DISC creating the mismatched shadow.
  - title: "RAT-Wild-EggGuardian"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle medium shot of the Egg Guardian kneeling in soft grass at Wobbly Willow Farm. The figure is robed in pale cream fabric with SMOOTH CLAY-PLASTIC SHADERS, its faceless head bowed protectively. Cradled in its arms is a large egg shape rendered with a SEMI-GLOSS SHEEN that glows with a soft, warm inner light. In a gentle POSE-TO-POSE rhythm, the egg pulses brighter then dimmer like breathing, while the figure rocks it slowly side-to-side in a protective motion. The egg's light casts a warm glow on the figure's robe with BOLD SHAPE DESIGN. The figure maintains a CLEAN SILHOUETTE throughout. The scene is lit by a COOL SATURATED PALETTE under twilight, with the egg providing the primary warm key light and soft RIM LIGHTING.
  - title: "RAT-Wild-MudCollector-Emergence"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium shot of the Mud Collector completing its rise from a puddle at Wobbly Willow Farm. Its body is a single, flowing form of dark, goopy slime rendered with SMOOTH CLAY-PLASTIC SHADERS and high-gloss SEMI-GLOSS SHEEN. In a slow, deliberate POSE-TO-POSE movement, the amorphous form extends upward from the puddle surface, pulling free with thick drips trailing behind. Three simple, white, mask-like faces—a blocky pig, a rounded sheep, a zany duck—rotate into view as the creature rises, each emerging from the slime with CLEAN SILHOUETTES. Ripples expand outward across the puddle surface with BOLD SHAPE DESIGN. The creature transitions from submerged to fully standing, slime still dripping. The scene is rendered with a WARM PASTEL PALETTE with soft bloom from a SINGLE LARGE CIRCULAR DISC sun.
  - title: "RAT-Wild-EyestalkMask-Tracking"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium close-up of the Eyestalk Mask creature at Wobbly Willow Farm. Its smooth, featureless white mask sits atop a pale, cracked body covered in fine CHUNKY CONTOUR LINES. Ten long, flexible green stalks sprout from the mask, each ending in a large, cartoon eyeball. In one sharp POSE-TO-POSE snap, all ten eyestalks whip from looking left to looking right simultaneously, tracking something passing off-screen. The eyeballs hold wide and unblinking, frozen in collective alarm. The stalks create sweeping DOODLED MOTION TRAILS in their wake. The tattered white tunic with graphic holes sways slightly from the sudden motion. The creature's body remains perfectly still while only the eyestalks moved. The scene is rendered with SMOOTH CLAY-PLASTIC SHADERS under a WARM PASTEL PALETTE with soft diffuse light.
  - title: "RAT-Wild-FieldTotem-Attention"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle shot of the Field Totem standing in a cornfield at Wobbly Willow Farm. Its body is composed of interlocking, blocky gray stone shapes with rough MATTE FINISH and SIMPLIFIED GRAPHIC GEOMETRY. Atop its thick neck sits a cluster of multiple carved heads, each with a different theatrical expression. In a slow, grinding POSE-TO-POSE sequence, the head cluster rotates as a single unit, turning to look directly at camera. The rotation is mechanical and deliberate, stone scraping on stone. The heads that were smiling, frowning, and sleeping all turn together, now facing forward. Corn stalks sway gently in the background, creating contrast with the totem's heavy movement. The entire figure maintains its weathered stance while only the head assembly turns. The scene is rendered with CLEAN SILHOUETTES under a WARM PASTEL PALETTE with SOFT POSTERIZED SHADOW SHAPES from corn stalks.
  - title: "RAT-Wild-SpiralWitness-Recognition"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A medium shot of the Spiral Witness standing at the pond's edge at Wobbly Willow Farm. The figure wears a simple grey robe with MATTE FINISH and SIMPLIFIED GRAPHIC GEOMETRY. Its head is a perfectly circular flat disc with a stark black and white hypnotic spiral pattern creating an unsettling focal point with BOLD SHAPE DESIGN. In a slow, deliberate POSE-TO-POSE tilt, the disc-head inclines downward from upright to angled toward camera, as if noticing the viewer. The spiral pattern becomes more directly visible as the disc tilts. The figure's robed body remains statue-still while only the head moves. Pond water ripples gently behind it with POLISHED PLASTIC REFLECTIONS. The tilt is smooth and purposeful, transforming from passive observation to direct attention. The scene is rendered with SMOOTH CLAY-PLASTIC SHADERS and CLEAN SILHOUETTES under a WARM PASTEL PALETTE.
  - title: "RAT-Wild-CrownOfHands-Gesture"
    prompt: |
      Clay-Plastic Pose-to-Pose Animation — A low-angle shot of the Crown of Hands on a grassy hill at Wobbly Willow Farm. The figure has a simple, robed body in dark blue with SMOOTH CLAY-PLASTIC SHADERS. Eight disembodied hands radiate from its head like a crown, each with clean, toy-like fingers and BOLD SHAPE DESIGN. In one sharp POSE-TO-POSE snap, all eight hands transition simultaneously from relaxed gestures to pointing at a single target off-screen in perfect unison. Fingers extend sharply, creating dramatic CLEAN SILHOUETTES against the sky. The sudden coordinated movement creates an eerie synchronization. The faceless, robed body tilts slightly in the direction the hands point. The scene is rendered under a COOL SATURATED PALETTE with deep indigo sky and strong RIM LIGHTING highlighting each hand's edges and fingers.
  - title: "RAT-Wild-BellWatcher-Chime"
    prompt: |
