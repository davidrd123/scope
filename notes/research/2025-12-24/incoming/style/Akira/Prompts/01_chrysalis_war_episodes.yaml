  # Opening: Black Box Recovery
  - title: Arc4-Opening-BlackBoxRecovery
    prompt: |
      1988 Cel Animation — Wide shot of recovery ship approaching debris field of destroyed ship months later. Salvage vessel rendered as FLAT-COLORED CEL with detailed industrial aesthetic - spotlights illuminating wreckage, mechanical arms extending toward debris. The destroyed ship's remains float in pieces, some sections showing contamination - organic growth still visible on hull fragments, bioluminescent even in death. PAINTED BACKGROUND shows deep space with Jupiter distant - scene of tragedy now cold and silent. Salvage crew in EVA suits approach black box recorder, movements cautious. Are they aware of what happened here? Does organic matter still pose threat? Animated on twos with slow, careful movements in zero-G. This framing device establishes that we're seeing recovered footage - the story is already over, these are ghosts. The composition emphasizes wreckage field scale - ship was utterly destroyed. Was it self-destruct or something else? DEEP BLACKS of space versus BRILLIANT HIGHLIGHTS from salvage ship lights.

  # Character: Investigator Reviews Footage
  - title: Arc4-Character-InvestigatorHorror
    prompt: |
      1988 Cel Animation — Medium shot of corporate investigator in clean Earth-station office months after incident, rendered as FLAT-COLORED CEL, professional woman watching recovered footage on multiple screens. Her face shows growing horror as she reviews ship's final days - screens show clips we've seen (earlier arc moments in miniature). Coffee cup forgotten in hand grows cold. Security classification documents pile on desk. PAINTED BACKGROUND shows sterile corporate office - potted plant, company logos, window showing Earth peaceful below, total contrast to horror on screens. She reaches moment of transformation footage, freezes frame on Patient Zero's offer to captain. Her hand covers mouth. Animated on ones showing creeping realization - this isn't just tragedy, it's threshold moment. Does she understand implications? Will she report truth or classify? The composition uses screens reflecting in her glasses, horror literally facing her. This meta-moment positions viewer as investigator too - what have we witnessed?

  # Dramatic: Cover-Up Decision
  - title: Arc4-Dramatic-CoverUpMeeting
    prompt: |
      1988 Cel Animation — Wide shot of corporate boardroom on Earth. Multiple executives rendered as FLAT-COLORED CELS around conference table, investigator presenting findings. One executive reaches across and closes her report, cutting off her mid-sentence. Others look uncomfortable but complicit. Faces show various reactions - some genuinely disturbed, others calculating cost/benefit of truth. PAINTED BACKGROUND shows expensive corporate boardroom with floor-to-ceiling windows showing Earth, art on walls, displays showing company stock price and mission success rates. The contrast is stark - safe Earth versus horror they're discussing. Investigator's face shows frustration and moral conflict - she knows truth must be told but is being silenced. Animated on twos with corporate body language - executives exchanging glances, decisive head shakes, one making "classified" gesture. This cynical scene shows institutional response to horror: deny, classify, protect profits. The composition uses long table separating investigator from executive power. Truth loses to institutional pressure.

  # World-Texture: Families Lied To
  - title: Arc4-WorldTexture-FalseCondolences
    prompt: |
      1988 Cel Animation — Medium shot of crew member's family receiving official notification at their home on Earth. Mother, father, young child rendered as FLAT-COLORED CELS sitting on couch, facing corporate representative delivering official story: "...tragic malfunction...crew died heroically...bodies unrecoverable..." Family shows grief but accepts explanation. PAINTED BACKGROUND shows comfortable Earth home with family photos on walls including crew member in uniform, normal domestic life. Through window, Earth sky is blue and peaceful - complete disconnection from space horror. The corporate rep's face shows practiced sympathy but no real grief - this is job, not tragedy for him. Animated on twos showing family's contained grief - mother quietly crying, father's hand clenching, child not understanding. They will never know truth - their loved one didn't die in malfunction but may have been transformed into something beyond human. Or did choose heroic death preventing contamination? This scene emphasizes human cost of cover-up - families denied closure, denied truth. The composition treats this as lie's consequence.

  # Character: Lone Survivor Found
  - title: Arc4-Character-SurvivorRecovered
    prompt: |
      1988 Cel Animation — Medium shot inside recovery ship medical bay. The ship's lone survivor from hiding rendered as FLAT-COLORED CEL lies on examination table, severely malnourished, traumatized, staring at nothing. She survived by hiding in sealed section for months, eating emergency rations, alone with corpses and sounds of transformed crew beyond bulkheads. Medical staff rendered around her checking vitals, but she doesn't respond to questions - psychological shutdown. Her eyes are wide, unblinking, seeing things that aren't there anymore. PAINTED BACKGROUND shows clean medical bay, total contrast to ship horror she survived. Animated on ones with minimal movement - only her shallow breathing, occasional tremor, dissociation. This tragic portrait shows survival isn't always mercy - she's alive but broken. Her knowledge of what happened makes her dangerous to cover-up. Will they "disappear" her? Or help her? Her face shows no hope either way. The composition isolates her in frame despite surrounding medical staff - she is alone in her trauma.

  # Dramatic: Survivor's Testimony
  - title: Arc4-Dramatic-SurvivorInterview
    prompt: |
      1988 Cel Animation — Close-up of survivor being debriefed in secure facility. She's recovered enough to speak, rendered as FLAT-COLORED CEL, face still gaunt, speaking in monotone recounting events. Her eyes are haunted. Across table (out of focus in background), corporate interrogator records her testimony but has already decided it will be classified. She describes Patient Zero's transformation, the mercy killing, the choice offered to captain. Her voice breaks describing watching transformed crew through vent - they weren't monsters, they had become something else, maybe something better, and humanity's response was to kill them. PAINTED BACKGROUND suggests secure interview room - bare walls, recording equipment, one-way mirror. Animated on ones capturing her traumatized delivery - sometimes she talks to interrogator, sometimes through him at memories. This testimony scene is core thematic statement: transformation was horror through human eyes, but was it evil? She admits she doesn't know. The composition uses extreme close-up making her face fill frame - we must witness her truth.

  # Confrontation: Investigator vs. Corporate
  - title: Arc4-Climax-InvestigatorDefiance
    prompt: |
      1988 Cel Animation — Medium two-shot of investigator and CEO in private office confrontation. Investigator rendered as FLAT-COLORED CEL standing, holding data-pad with evidence, face showing righteous anger. CEO sits behind massive desk, rendered with calm ruthless authority. She demands truth be released. He explains calmly why it can't be: panic, stock collapse, funding cuts to space program, potential copycats seeking transformation. Both have valid points. PAINTED BACKGROUND shows CEO office with Earth visible through window - the stakes are planetary. Is he protecting humanity or corporate profit? Are they same? Investigator's face shows moral struggle - she knows he's partially right, but truth matters. Animated on ones showing escalating confrontation - her leaning over desk, him unmoved, both voices rising (implied). The composition uses desk as barrier - institutional power versus individual conscience. She can leak evidence, become whistleblower, destroy career. Or accept compromise, let lie protect people. What does she choose?

  # World-Texture: Memorial Ceremony
  - title: Arc4-WorldTexture-FalseMemorial
    prompt: |
      1988 Cel Animation — Wide shot of public memorial service for lost crew on Earth. Stage with photos of crew members rendered beautifully, all in uniform, all smiling. Officials give speeches praising their sacrifice. Families in audience seats rendered as FLAT-COLORED CELS show dignified grief. The event is respectful, proper, and completely false - crew didn't die in malfunction, truth is classified. PAINTED BACKGROUND shows memorial park with Earth greenery, blue sky, peaceful setting. Some crew members may still be alive in transformed state in quarantine. Monument reads: "They gave their lives for science and exploration." Investigator stands at back of ceremony, face showing internal conflict - participat in lie or speak truth? Animated on twos showing ceremony formality - honor guard, flag presentation, carefully managed media. This scene captures how societies process horror - with comforting lies, transforming messy truth into clean narrative. The composition shows ceremony's artificial composition - staged, managed, sanitized.

  # Climactic: Second Mission Launches
  - title: Arc4-Climax-SecondMissionLaunch
    prompt: |
      1988 Cel Animation — Wide shot of new research vessel launching from Earth, months after first ship's destruction. Gleaming new ship rendered as FLAT-COLORED CEL with precise mechanical detail, ascending through atmosphere on bright clean rocket thrust. Ground control celebrates successful launch. PAINTED BACKGROUND shows launch facility with crowds watching, blue Earth sky, hopeful music implied. But camera pulls back to reveal: mission profile includes coordinates to Chrysalis artifact - they're going back. Corporate greed, scientific curiosity, or genuine need to understand? Investigator watches launch from facility window, face showing resignation or horror - she tried to prevent this, failed. Survivor (from first ship) watches same launch from psychiatric facility window, face showing knowing dread. New crew doesn't know what they're approaching. Animated with triumphant launch energy cutting to horrified observers. The composition uses split-screen implication: celebration and dread of same event. Humanity learns nothing. Cycle repeats. This is horror of inevitability.

  # Character: Investigator's Final Report
  - title: Arc4-Character-FinalReportBurn
    prompt: |
