batch:
  name: Akira-Chrysalis-War-Episodes
  session: Chrysalis-Narrative

defaults:
  workflow_template: Templates/Workflows/WAN22/t2v/wan2_2_t2v_speedup_v1
  width: 720
  height: 1280
  frames: 65
  runs: 1
  t2v_lora_low: akira/akira_v1_wan_low_13000steps.safetensors
  t2v_lora_high: akira/akira_v1_wan_high_14250steps.safetensors
  t2v_steps: 10
  t2v_high_steps: 5
  negative_prompt: |
    色调艳丽, 过曝, 静态, 细节模糊不清, 字幕, 风格, 作品, 画作, 画面, 静止, 整体发灰, 最差质量, 低质量, JPEG压缩残留, 丑陋的, 残缺的, 多余的手指, 画得不好的手部, 画得不好的脸部, 畸形的, 毁容的, 形态畸形的肢体, 手指融合, 杂乱的背景, 背景人很多, 倒着走, slow-motion, split screen, text, signature, watermark, logo, timestamp, cartoon, modern anime style, moe, chibi, illustration, 3d render, CGI, rendered, painting, sketch, comic book style, plastic skin, overly smooth features, doll-like, mannequin, untextured surfaces, artifacting, compression artifacts, glitch, digital noise, banding, pixelation, frame, border, collage, oversaturated, pastel colors, soft colors, flat lighting, low contrast, low detail background, empty background, out of focus detail, extreme color cast, monochrome unless specified, generic AI look, uncanny valley, poorly fused elements, inconsistent lighting unless specified

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # ARC 1: FIRST CONTACT
  # The discovery of the Chrysalis artifact and patient zero infection
  # ═══════════════════════════════════════════════════════════════════

  # Opening: The Approach
  - title: Arc1-Opening-ArtifactApproach
    prompt: |
      1988 Cel Animation — Wide shot of deep space research vessel approaching mysterious Chrysalis artifact floating near Jupiter. The ship rendered as FLAT-COLORED CEL with precise mechanical detail showing panels, antennae, running lights. The Chrysalis artifact is massive black crystalline structure with organic tendrils, rendered with BOLD BLACK INK OUTLINES, pulsing with faint blue bioluminescence. PAINTED BACKGROUND shows Jupiter's swirling clouds and star-field. The scale emphasizes artifact's overwhelming size versus human vessel. Cold harsh lighting from Jupiter creates BRILLIANT HIGHLIGHTS on ship hull versus DEEP BLACKS of space. Slow approach, animated on twos, building tension. The composition suggests ominous discovery - humanity encountering something beyond comprehension.

  # Character: Lead Scientist's Fascination
  - title: Arc1-Character-ScientistFascination
    prompt: |
      1988 Cel Animation — Medium shot inside ship observation deck. Lead scientist Dr. Chen rendered as FLAT-COLORED CEL with detailed features, Asian woman in her 40s, lab coat with mission patches, standing at large viewport. Her face shows wonder and obsessive curiosity as she watches Chrysalis artifact data streaming on holographic displays. PAINTED BACKGROUND shows ship interior with clean sci-fi aesthetic - white panels, blue accent lighting, complex instrumentation. The artifact is visible through viewport, dominating her attention. Her expression is mixture of scientific excitement and dangerous fixation. Soft blue lighting from screens creates highlights on her face. Animated on ones showing subtle expressions - eyes wide, slight smile, leaning forward. This captures the moment before everything goes wrong - humanity's fatal curiosity.

  # Dramatic: First Touch
  - title: Arc1-Dramatic-FirstTouch
    prompt: |
      1988 Cel Animation — Close-up of astronaut's gloved hand making contact with Chrysalis artifact surface. The hand rendered as FLAT-COLORED CEL in white spacesuit material with precise texture detail. The artifact surface is matte black with subtle organic texture, rendered with BOLD BLACK INK OUTLINES. At moment of contact, brilliant blue energy arcs erupt from contact point as HAND-DRAWN LIGHTNING ARCS, crackling up the arm. White IMPACT FRAMES flash. The astronaut's helmet is visible in frame, visor reflecting the energy discharge, face inside showing sudden shock and pain. PAINTED BACKGROUND blurs into abstract as the energy surges. This is patient zero moment - first human infection. Animated on ones through the touch for visceral impact. BRILLIANT HIGHLIGHTS on energy discharge versus DEEP BLACKS of artifact. The composition emphasizes transgression - touching the untouchable.

  # Slice-of-life: Crew Meal Before
  - title: Arc1-WorldTexture-LastNormalMeal
    prompt: |
      1988 Cel Animation — Medium wide shot of ship's mess hall during crew dinner. Six crew members rendered as FLAT-COLORED CELS seated around table, various ages and ethnicities, casual conversation, sharing meal. The astronaut who touched the artifact (Patient Zero) sits among them, appearing normal, laughing at joke. DENSELY DETAILED PAINTED BACKGROUND shows functional ship interior - metal tables bolted to floor, recycling bins, food dispensers, mission posters on walls. Warm lighting creates domestic atmosphere contrasting with clinical ship aesthetic. Crew members show genuine camaraderie - these are people who trust each other. Animated on twos with natural gestures - eating, gesturing while talking, passing containers. This is the last normal moment before everything changes. The composition emphasizes humanity and connection that will soon be destroyed. No visible threat yet - just lived-in space life.

  # Character: Patient Zero's First Symptoms
  - title: Arc1-Character-PatientZeroSymptoms
    prompt: |
      1988 Cel Animation — Close-up on Patient Zero's face in ship bunk at night. Male astronaut in his 30s, rendered as FLAT-COLORED CEL, lying in darkness with only faint red emergency lighting. His eyes are open, unable to sleep, skin beginning to show first signs - veins on temple glowing faintly blue beneath skin, subtle bioluminescence animated on ones with gentle pulsing. His expression shows confusion and growing fear - he knows something is wrong but doesn't understand what. PAINTED BACKGROUND shows cramped bunk with personal items - photos of family, mission patch, tablet screen casting faint glow. The blue veins create BRILLIANT HIGHLIGHTS against DEEP BLACKS of the darkened bunk. His breathing is visible as chest rises and falls. This intimate moment shows transformation beginning at cellular level before anyone else knows. The composition creates sympathy - this is a person, not yet a monster.

  # Dramatic: Medical Scan Discovery
  - title: Arc1-Dramatic-MedicalScanHorror
    prompt: |
      1988 Cel Animation — Medium shot in ship medical bay. Ship's doctor rendered as FLAT-COLORED CEL, older Black man, staring in horror at holographic medical scan results floating before him. The scan shows Patient Zero's body as translucent outline with skeletal and organ systems visible, but blue crystalline structures are growing through the nervous system like infection, rendered with precise geometric detail and BOLD BLACK INK OUTLINES. PAINTED BACKGROUND shows clinical medical bay with examination table, instruments, sterile white and steel blue color scheme. The doctor's face shows professional horror transforming to personal fear - realization that this is beyond medical science. Multiple diagnostic screens show spreading contamination. Harsh fluorescent lighting creates clinical atmosphere. The scan imagery suggests alien rewriting of human biology. This is the moment of confirmation - they brought something terrible aboard.

  # Confrontation: Informing the Captain
  - title: Arc1-Dramatic-ConfrontationCaptain
    prompt: |
      1988 Cel Animation — Medium two-shot in Captain's quarters. Captain rendered as FLAT-COLORED CEL, stern woman in her 50s, grey hair in regulation bun, sitting behind desk. Doctor stands opposite, animated on ones showing agitated body language - hands gesturing urgently, leaning forward. Both faces show tension. Captain's expression shifts from skepticism to grim acceptance as doctor explains situation. PAINTED BACKGROUND shows small office with star charts, mission directives, family photo turned face-down (captain's sacrifice), viewport showing Jupiter. The composition uses desk as barrier between them - professional distance during crisis. Lighting is cold, blue-white from desk console. Through viewport, tiny Chrysalis artifact is barely visible in distance - reminder that threat originated outside. This dialogue scene captures command burden - captain must decide crew's fate with incomplete information. Both characters rendered with detailed expressions showing emotional weight.

  # Climactic: Quarantine Order
  - title: Arc1-Climax-QuarantinePatientZero
    prompt: |
      1988 Cel Animation — Wide shot of medical bay converted to quarantine chamber. Patient Zero rendered as FLAT-COLORED CEL now sealed behind reinforced glass barrier, his veins visibly glowing blue with spreading infection, flesh beginning to show subtle mutations - fingers slightly elongated, skin texture changing. He pounds on glass barrier in desperation, animated on ones with fluid motion showing panic. Outside the barrier, captain and crew members watch with mix of fear and sympathy. PAINTED BACKGROUND shows medical bay with emergency quarantine seals activated - red warning lights strobing, yellow bio-hazard markings, sealed ventilation ducts. The glass barrier creates visual separation - infected versus clean. Patient Zero's reflection in the glass shows his transforming face. This is isolation horror - watching someone you know become something else. BRILLIANT HIGHLIGHTS from warning lights versus DEEP BLACKS in shadows. The composition emphasizes barrier and separation.

  # Character: Patient Zero's Plea
  - title: Arc1-Character-PatientZeroPlea
    prompt: |
      1988 Cel Animation — Extreme close-up of Patient Zero's face pressed against quarantine glass. Rendered as FLAT-COLORED CEL with painful detail - blue veins glowing beneath skin, one eye beginning to change color from brown to luminescent blue, skin developing subtle crystalline texture. His mouth is open mid-plea, condensation from his breath on glass. Expression shows desperation, fear, humanity struggling against transformation. The glass creates slight distortion. PAINTED BACKGROUND blurs to abstraction - only his face and the glass barrier in focus. Tears stream down his face, catching bioluminescent glow. This intimate portrait emphasizes that he is still human enough to be terrified of what he's becoming. Animated on ones to capture micro-expressions - the moment between breaths, trembling lip, dilating pupils. BRILLIANT HIGHLIGHTS from bio-luminescence versus natural skin tones fading. The composition creates empathy before horror.

  # World-Texture: Crew Routine Under Quarantine
  - title: Arc1-WorldTexture-QuarantineRoutine
    prompt: |
      1988 Cel Animation — Wide shot of ship corridor during quarantine protocols. Crew members rendered as FLAT-COLORED CELS moving through their duties wearing bio-hazard suits, faceplates showing tense expressions. They avoid making eye contact with each other, paranoia beginning. One crew member pauses to look through small window into sealed quarantine section. DENSELY DETAILED PAINTED BACKGROUND shows ship corridor with yellow quarantine tape across sections, bio-hazard warning signs, air filtration running visibly, emergency lighting active. The normal ship traffic flow is disrupted - people take longer routes to avoid certain areas. Animated on twos showing careful, nervous movement - checking suit seals repeatedly, maintaining distance from each other. This captures how fear changes daily life - mundane tasks now loaded with dread. The composition shows isolation even when not physically separated. Sound design implied: respirator breathing, footsteps echoing, alarm drone.

  # Climactic: Transformation Accelerates
  - title: Arc1-Climax-AcceleratedMutation
    prompt: |
      1988 Cel Animation — Dynamic medium shot of Patient Zero in quarantine chamber as transformation violently accelerates. His body rendered as FLAT-COLORED CEL convulses, back arching, limbs twisting. Blue energy erupts through his body as HAND-DRAWN LIGHTNING ARCS. Flesh expands grotesquely in rapid mutation sequence animated on ones - ribs visible through thinning skin, muscle tissue bubbling, bone structure shifting. White IMPACT FRAMES punctuate transformation beats. His face contorts between human and something else, mouth opening in silent scream. PAINTED BACKGROUND shows medical equipment sparking and failing around him, monitors flatling, glass barrier beginning to crack with BOLD BLACK INK OUTLINES showing fracture lines. The medical bed breaks beneath his changing mass. This is body horror unleashed - the infection taking full control. BRILLIANT HIGHLIGHTS on crackling energy and wet mutating flesh versus DEEP BLACKS in chamber shadows. The composition emphasizes violent loss of human form.

  # Dramatic: Barrier Breach
  - title: Arc1-Climax-BarrierBreakthrough
    prompt: |
      1988 Cel Animation — Wide shot capturing moment quarantine barrier shatters. The reinforced glass explodes outward in slow-motion animated on ones, fragments rendered with precise geometric shapes catching light as they spray toward camera. Patient Zero's mutated arm rendered as grotesque FLAT-COLORED CEL with exposed muscle tissue, elongated fingers, blue bioluminescent veins punches through, glass shards embedded in transformed flesh. Crew members outside dive for cover, faces showing terror. OPAQUE PAINTED SMOKE PLUMES of released contaminated air billow through breach. PAINTED BACKGROUND shows medical bay in chaos - warning lights strobing red, emergency doors beginning to seal too late, crew scrambling. The composition uses diagonal lines of fleeing crew and debris to create kinetic chaos. This is the containment failure moment - the infection is loose. BRILLIANT HIGHLIGHTS on glass fragments versus DEEP BLACKS. Sound design implied: alarm klaxon, shattering glass, screams.

  # ═══════════════════════════════════════════════════════════════════
  # ARC 2: CONTAINMENT FAILURE
  # Paranoia spreads faster than infection. Trust dissolves.
  # ═══════════════════════════════════════════════════════════════════

  # Opening: Lockdown Protocol
  - title: Arc2-Opening-EmergencyLockdown
    prompt: |
      1988 Cel Animation — Wide shot of ship bridge during emergency lockdown. Captain at command chair rendered as FLAT-COLORED CEL, face illuminated by red emergency lighting, hand hovering over section seal controls. Bridge crew at stations show tension - fingers poised on consoles, bodies rigid. DENSELY DETAILED PAINTED BACKGROUND shows bridge with multiple screens displaying ship schematic with sections turning red as they seal, crew location dots moving frantically, containment breach alerts flashing. The main viewport shows Jupiter and Chrysalis artifact - beautiful and indifferent to human crisis. Animated on twos with precise attention to button presses and screen updates. This is command under crisis - making terrible decisions with incomplete information. The composition emphasizes isolation of command - captain alone in decision while crew waits. Harsh red emergency lighting creates DEEP BLACKS in shadows versus BRILLIANT HIGHLIGHTS on consoles.

  # Character: Trapped Crew Member
  - title: Arc2-Character-SealedInSection
    prompt: |
      1988 Cel Animation — Medium shot of young engineer rendered as FLAT-COLORED CEL, woman in her 20s, trapped on wrong side of emergency bulkhead door. She pounds on sealed door, animated on ones showing desperate motion, face pressed to small door window. Through window, on safe side, her friend watches helplessly, hand pressed to glass from other side - mirror poses showing connection severed by barrier. PAINTED BACKGROUND shows corridor split by massive sealed door with yellow and black hazard stripes, red warning lights spinning, digital readout showing section is contaminated (though she appears uninfected). The composition uses the door window as frame within frame, emphasizing barrier. Both women are crying. This intimate moment captures collateral damage of survival protocols - sacrificing potential infected to save definite clean. BRILLIANT HIGHLIGHTS from warning lights catch tears on both faces. The implication: she may not be infected, but she's dead anyway.

  # Slice-of-Life: Paranoid Meal
  - title: Arc2-WorldTexture-ParanoidDinner
    prompt: |
      1988 Cel Animation — Medium wide shot of mess hall with only three remaining crew members eating in tense silence. Each sits at separate table, maximum distance from each other, rendered as FLAT-COLORED CELS wearing bio-hazard suits, eating through suit ports. They glance at each other with suspicion - checking for signs of infection. One crew member's hand trembles slightly holding utensil, causing others to stare. PAINTED BACKGROUND shows mess hall now in disarray - overturned chairs from previous evacuation, food trays abandoned, hand-written quarantine warnings taped to walls, one flickering light creating uneven illumination. This contrasts Arc1's warm crew meal - same location, destroyed trust. Animated on twos with nervous gestures - constant checking of suit seals, flinching at sounds, maintaining sight lines to exits. The composition emphasizes empty space where crew used to sit together. Trust is dead.

  # Dramatic: Accusation
  - title: Arc2-Dramatic-AccusationScene
    prompt: |
      1988 Cel Animation — Dynamic medium shot of confrontation in ship corridor. Security officer rendered as FLAT-COLORED CEL, large muscular man, pins younger crew member against wall, flashlight beam in his face, checking his eyes for blue glow of infection. The accused crew member's face shows terror and indignation, hands raised defensively. Both animated on ones with aggressive body language. Other crew members watch from safe distance, hands near weapons. PAINTED BACKGROUND shows corridor in emergency lighting with shadows distorting figures, making everyone look monstrous. The flashlight beam creates harsh BRILLIANT HIGHLIGHTS on the accused's face, washing out features, making him look alien. This is paranoia turned violent - humans hurting humans out of fear. The composition uses aggressive angles and close framing to create claustrophobia. Accusations don't require proof anymore. Every cough, every unusual behavior is evidence. Social order breaking down.

  # Character: Captain's Isolation
  - title: Arc2-Character-CaptainAlone
    prompt: |
      1988 Cel Animation — Close-up of captain alone in her quarters, rendered as FLAT-COLORED CEL sitting on floor against wall instead of desk, facade of command dropped. She holds pistol loosely in one hand - protection or escape option? Her face shows exhaustion and moral weight - she has sealed sections with her crew inside, made impossible choices. PAINTED BACKGROUND shows her quarters in disarray - family photo now visible again, mission directives scattered, half-drunk coffee gone cold. Viewport shows empty space - they've lost orbit, drifting. Animated on ones with subtle performance - shoulders rising and falling with shaky breaths, fingers absently checking pistol safety, thousand-yard stare. This intimate moment shows cost of command - she has kept crew alive by condemning others, and it's destroying her. Soft blue light from console versus DEEP BLACKS. The composition emphasizes her smallness in the frame - powerful person rendered powerless.

  # Confrontation: Mutiny Consideration
  - title: Arc2-Dramatic-MutinyWhispers
    prompt: |
      1988 Cel Animation — Medium shot of three crew members huddled in dark cargo bay, rendered as FLAT-COLORED CELS in bio-hazard suits, having whispered conversation. Engineer, doctor, and pilot shown from low angle making them feel conspiratorial. They're considering taking control from captain who they believe is making fatal decisions. Faces show conflict - fear of infection versus horror at captain's willingness to sacrifice crew. One gestures toward air duct where they could bypass sealed sections. PAINTED BACKGROUND shows cargo bay filled with mission supplies that will never be delivered, stacked crates creating maze-like space, single emergency light creating dramatic shadows. Animated on twos with furtive movements - constant checking over shoulders, speaking close together. This isn't evil mutiny, it's desperate people with different calculus of survival. The composition uses shadows and crates to fragment the frame - broken leadership creates broken crew.

  # World-Texture: Infection Spread Signs
  - title: Arc2-WorldTexture-ContaminationSigns
    prompt: |
      1988 Cel Animation — Montage-style wide shot of ship sections showing contamination spreading. Multiple areas visible: corridor with blue bioluminescent slime growing on walls, ventilation grate with crystalline growths emerging, crew quarters with personal effects covered in organic-tech corruption, all rendered with BOLD BLACK INK OUTLINES and DENSELY DETAILED PAINTED BACKGROUNDS. No crew visible - this is environmental horror. The ship itself is being transformed, infected systems creating hybrid bio-mechanical aesthetic. Walls pulse as if breathing. Wiring becomes vein-like. Metal develops organic texture. Animated on ones with subtle movement - slime dripping, crystals slowly growing, lights flickering as systems corrupt. This establishes that containment has comprehensively failed - not just crew infected, but ship itself being rewritten. Palette shifts from clean ship whites/blues to organic reds/purples/blues of infection. The composition uses segmented frame to show multiple locations simultaneously.

  # Climactic: First Transformed Encounter
  - title: Arc2-Climax-EncounterTransformed
    prompt: |
      1988 Cel Animation — Dynamic wide shot in ship corridor as crew member rounds corner and comes face-to-face with fully transformed Patient Zero. The transformed rendered as grotesque FLAT-COLORED CEL - formerly human but now bio-mechanical hybrid with elongated limbs, exposed muscle fused with crystalline tech, multiple eyes glowing blue, head tilted at unnatural angle. Still recognizable as Patient Zero from remaining uniform scraps. The uninfected crew member rendered frozen in terror. Brief moment of recognition between them - does it remember being human? PAINTED BACKGROUND shows corridor warped by contamination - walls organic, lighting flickering, floor uneven with growths. The composition uses doorway as frame, transformed figure backlit creating ominous silhouette before stepping into light revealing full horror. This is the reveal moment - seeing what infection creates. Animated on ones for visceral impact. Neither figure moves - frozen encounter before violence or flight.

  # Dramatic: Mercy Kill Decision
  - title: Arc2-Climax-MercyKillMoment
    prompt: |
      1988 Cel Animation — Close-up two-shot of doctor rendered as FLAT-COLORED CEL standing over newly-infected crew member showing early symptoms - blue veins appearing, flesh beginning to change. The infected person's face shows lucid terror, hand reaching up grasping doctor's arm, begging. Doctor's other hand holds syringe with lethal dosage, hand trembling. Both faces show impossible emotional weight - infected person begging for death before losing themselves, doctor facing decision to kill someone still human to prevent them becoming monster. PAINTED BACKGROUND blurs to abstraction, just medical bay suggestion. Animated on ones capturing micro-expressions - infected person's moment of grateful acceptance, doctor's horror at becoming killer. This ethical crisis scene asks: is mercy-killing murder or kindness? The composition uses extreme close-up to force viewer to witness both faces, both perspectives. No easy answer. BRILLIANT HIGHLIGHTS on tears, DEEP BLACKS framing faces.

  # Character: Last Message Home
  - title: Arc2-Character-FinalTransmission
    prompt: |
      1988 Cel Animation — Medium shot of crew member recording final message to family on Earth. Rendered as FLAT-COLORED CEL, young woman sitting in her bunk, face to camera screen showing video recording interface. She's trying to stay composed, smiling weakly, telling family she loves them without revealing the horror of situation. Voice breaking on certain words (implied through expression even without sound). PAINTED BACKGROUND shows her small quarters with family photos displayed, personal items carefully arranged - she's tried to make this last message seem normal. Through small porthole window, contaminated corridor visible with blue glow - she knows she won't survive. Animated on ones with heartbreaking performance - wiping away tears before they show, forcing smile, hand almost touching screen as if touching family. This intimate moment emphasizes human cost - not just survival horror but loss of futures. Soft warm light on her face contrasts with cold blue from corridor. The composition treats this as confession booth - one person, one final truth.

  # Climactic: Section Jettison
  - title: Arc2-Climax-SectionJettison
    prompt: |
      1988 Cel Animation — Wide exterior shot of ship in space as entire infected section explosively detaches and jettisons. The section rendered as FLAT-COLORED CEL with precise mechanical detail showing explosive bolts firing, compressed air jets pushing it away from main ship hull. Through section windows, infected crew members visible as silhouettes, some transformed, some still human, all doomed. Main ship accelerates away, engines firing. PAINTED BACKGROUND shows deep space with Jupiter in distance and Chrysalis artifact - they're fleeing both. The jettisoned section tumbles in space, lights flickering, atmosphere venting as small blue plumes. This is brutal pragmatism - sacrificing infected section to save clean sections. Animated on ones for dynamic space action. The composition emphasizes scale and violence of separation - cutting off diseased limb metaphor made literal. Some of those jettisoned may not even be infected yet. BRILLIANT HIGHLIGHTS from engine fire versus DEEP BLACKS of space. Sound design implied: explosive decompression, grinding metal, silence.

  # ═══════════════════════════════════════════════════════════════════
  # ARC 3: THE TRANSFORMED
  # What remains is no longer human. Former crew-mates become hunters.
  # ═══════════════════════════════════════════════════════════════════

  # Opening: Aftermath Silence
  - title: Arc3-Opening-SilentShip
    prompt: |
      1988 Cel Animation — Slow tracking shot through abandoned ship corridor, camera moving forward steadily animated on ones. No crew visible - only evidence of struggle: emergency suit torn and discarded, blood smears on walls, claw marks in metal, overturned equipment. DENSELY DETAILED PAINTED BACKGROUND shows contaminated ship sections - walls have organic growth, lighting failures create pools of darkness, floating droplets of contaminated fluid drift in zero-gravity sections. The silence is oppressive. Distant mechanical groans and drips echo. This establishes aftermath tone - survivors are hiding, transformed are hunting. The ship has become alien environment. Color palette shifted entirely to horror - sickly greens, bio-luminescent blues, deep blacks, emergency reds. The composition uses empty corridor to create dread - something is here but not visible yet. This tracking shot builds tension through anticipation - what will camera find around corner?

  # Character: Survivor in Hiding
  - title: Arc3-Character-SurvivorHiding
    prompt: |
      1988 Cel Animation — Close-up of lone survivor rendered as FLAT-COLORED CEL hiding in storage locker, young pilot woman, face covered in grime and dried blood, clutching improvised weapon (pipe wrench), breathing shallow trying to stay silent. Her face shows exhausted terror - she's been hiding for hours, maybe days. Eyes track back and forth watching locker door seam for shadows, flinching at distant sounds. PAINTED BACKGROUND shows cramped storage space with supplies, dim emergency lighting filtering through vent slats creating bars of light across her face like prison cell. One hand clamps over her own mouth suppressing breathing sounds. Animated on ones with tiny involuntary movements - trembling from fear and cold, pupils dilating at sounds, white-knuckle grip on weapon. This intimate moment captures survival horror - reduced to animal hiding from predator. The composition uses tight framing to create claustrophobia. She is utterly alone.

  # World-Texture: Transformed Nest
  - title: Arc3-WorldTexture-TransformedHabitat
    prompt: |
      1988 Cel Animation — Wide shot revealing what transformed crew has done to ship's cargo bay. The space has been converted to alien nest - organic growth covers all surfaces creating bio-mechanical cathedral aesthetic, pulsing walls, bioluminescent veins providing eerie blue-green lighting, cocoon structures hanging from ceiling (are there people inside? Dead? Transforming?). Several transformed crew rendered as FLAT-COLORED CELS move through space with disturbing grace - no longer clumsy mutants but adapted creatures, their movements fluid, coordinated. Some are building or maintaining the nest structure. PAINTED BACKGROUND shows former cargo bay completely transformed into hive space with biomech aesthetic borrowed from Akira but in service of horror. This isn't chaos - it's new order, alien but intentional. The transformed are creating something. Animated on twos showing non-human movement patterns - wall-crawling, group synchronization. The composition emphasizes overwhelming transformation of human space into alien territory. Are they still conscious? Do they remember being human?

  # Dramatic: Recognition Scene
  - title: Arc3-Dramatic-RecognitionMoment
    prompt: |
      1988 Cel Animation — Medium two-shot of survivor encountering transformed crew member she knew well - her friend, partner, or sibling. Survivor rendered as FLAT-COLORED CEL, weapon raised but hand shaking, face showing recognition fighting horror. The transformed crew member rendered as bio-mechanical hybrid - still partially recognizable features, maybe wearing remnants of uniform, one human eye and one transformed glowing blue, body twisted but face showing... something. Does it recognize her? It tilts head, movement almost curious rather than aggressive. PAINTED BACKGROUND shows corridor intersection, contaminated but not fully transformed - liminal space between human and alien ship. This emotionally loaded moment asks: is there anything left of the person inside? Survivor's face cycles through reactions - recognition, hope, horror, grief. Animated on ones for subtle interaction - creature makes gesture that echoes human habit, survivor almost responds before remembering it's not human anymore. Neither attacks. Tense standoff. The composition uses equal framing giving both figures weight - not human versus monster but two beings that once knew each other.

  # Climactic: The Hunt
  - title: Arc3-Climax-TransformedHunt
    prompt: |
      1988 Cel Animation — Dynamic tracking shot following survivor running through ship corridors in desperate flight. Survivor rendered as FLAT-COLORED CEL, sprinting, animated on ones with fluid panicked motion, looking back over shoulder. Behind her, three transformed crew members pursue with horrifying efficiency - moving on walls and ceiling as easily as floor, faster than human possible, rendered with long limbs and predatory grace. PAINTED BACKGROUND is contaminated ship corridor flying past - she runs through pools of light and shadow, emergency doors slamming behind her (delays but doesn't stop pursuit), sparking systems. The composition uses depth - pursuers getting closer despite her sprint. This is pure chase horror - prey running from predator that was once ally. OPAQUE PAINTED SMOKE from damaged systems obscures, allowing transformed to appear and disappear. BRILLIANT HIGHLIGHTS from muzzle flashes as she fires behind her (misses) versus DEEP BLACKS. Sound design implied: gasping breath, screeching transformed, pounding feet, alarms.

  # Character: Transformed Communication Attempt
  - title: Arc3-Character-TransformedSpeech
    prompt: |
      1988 Cel Animation — Close-up of transformed crew member's face attempting to speak. Rendered as FLAT-COLORED CEL showing hybrid state - jaw structure altered making speech difficult, human vocal cords producing distorted sounds, but it's clearly TRYING to communicate human words. Multiple eyes blink in non-synch. Mouth struggles to form shapes. Blue bioluminescence pulses in throat as it attempts voice. Expression shows frustration or confusion - awareness that communication should be possible but body won't cooperate. PAINTED BACKGROUND suggests medical bay or science lab - it returned to location with meaning. Animated on ones with painful attention to difficulty - vocal attempts creating garbled sounds, biological struggle. This raises horrifying question: are they conscious? Do they remember being human but trapped in transformed body? Or is this stimulus-response, body running language programs without meaning? The composition uses extreme close-up forcing viewer to witness attempt at humanity from inhuman face. Disturbing empathy.

  # Dramatic: Transformed Mercy
  - title: Arc3-Dramatic-TransformedMercy
    prompt: |
      1988 Cel Animation — Medium shot of surprising moment: survivor cornered by transformed crew member, weapon empty, awaiting death. But transformed being rendered as FLAT-COLORED CEL doesn't kill - instead it backs away, tilting head, then turns and leaves. Survivor's face shows shock and confusion. The transformed pauses at doorway, looks back (does that count as looking? Multiple eyes create strange gaze), then departs. PAINTED BACKGROUND shows dead-end corridor - survivor was completely trapped. This moment completely inverts expectation - the transformed showed choice, restraint, maybe recognition. Why? Did it remember friendship? Is there mercy in the transformation? Or different motivation humans can't understand? Animated on ones showing the transformed's deliberate decision - it could kill, chooses not to. The composition uses doorway framing - transformed leaves frame, survivor left staring in disbelief. This complicates horror - monsters might not be monsters, or humans don't understand what they've become.

  # World-Texture: Transformed Society
  - title: Arc3-WorldTexture-TransformedCommunity
    prompt: |
      1988 Cel Animation — Wide shot observed from hidden vantage showing multiple transformed crew members engaged in coordinated activities in ship's former common area. They're not mindless monsters - they work together with clear purpose, some tend bioluminescent growths (farming?), others manipulate ship systems (with transformed hands that blend with consoles), others in what looks like communication or teaching. All rendered as FLAT-COLORED CELS with body horror aesthetic but organized behavior. DENSELY DETAILED PAINTED BACKGROUND shows space completely transformed - bio-mechanical fusion of ship and organism creating new aesthetic. They've created society, alien but functional. Animated on twos showing complex interactions - passing objects, coordinated work, group attention to tasks. This world-building moment suggests transformation isn't end but new beginning - they're not dying, they're evolving into something else with its own culture. The composition uses high angle suggesting observer (survivor watching through vent), emphasizing their organization. Are they victims or next stage? The horror shifts from "body horror" to "replacement horror" - humanity being obsoleted.

  # Confrontation: Last Human vs. Transformed Leader
  - title: Arc3-Climax-FinalStandoff
    prompt: |
      1988 Cel Animation — Wide shot in ship bridge showing last standoff. Ship captain (last remaining uninfected) rendered as FLAT-COLORED CEL stands at ship controls, having set self-destruct sequence. Facing her across bridge is Patient Zero - fully transformed but clearly the leader of the transformed crew, rendered with terrible beauty - biomechanical form showing intelligence and purpose, no longer monster but something beyond human. Multiple transformed crew members flank it. Captain's hand hovers over final destruct confirm. They face each other across bridge. PAINTED BACKGROUND shows bridge transformed into hybrid space - partially human ship controls, partially organic alien growth, screens showing ship systems and countdown. This is ideological standoff: Captain chooses death over transformation. Patient Zero (if consciousness remains) offers evolution. Both have valid positions from their perspectives. Animated on twos with tense stillness - neither side moves, pure confrontation of wills. The composition uses symmetrical framing - captain center left, transformed leader center right, bridge bisecting them. Who is right? What would you choose?

  # Climactic: Transformation Offer
  - title: Arc3-Climax-TransformationChoice
    prompt: |
      1988 Cel Animation — Close-up of captain's face as Patient Zero (transformed) extends biomechanical hand toward her in gesture that is clearly invitation, not attack. Captain rendered as FLAT-COLORED CEL, face showing complex emotions - revulsion, temptation, grief, defiance. The offered hand is beautiful in its horror - elegant biomech fusion with blue bioluminescence, no longer human but transcendent in its own way. She could accept transformation and end the pain, join the evolved. Or detonate ship, killing all. PAINTED BACKGROUND soft-focuses to blur - only faces and offered hand in focus. Animated on ones capturing her internal struggle - hand trembling near destruct button, eyes moving from hand to transformed face of her former crew. This is the moral crux: is transformation death or rebirth? The composition uses shallow depth of field isolating the choice. Her expression cycles through: horror→ consideration→temptation→resolve. What does she choose? The scene cuts before answer, leaving it ambiguous.

