batch:
  name: Akira-T2V-2001-Monolith
  session: T2V-2001-Monolith

defaults:
  workflow_template: Templates/Workflows/WAN22/t2v/wan2_2_t2v_speedup_v1
  width: 720
  height: 1280
  frames: 81
  runs: 4
  t2v_lora_low: akira/akira_v1_wan_low_13000steps.safetensors
  t2v_lora_high: akira/akira_v1_wan_high_14250steps.safetensors
  t2v_steps: 8
  t2v_high_steps: 4
  negative_prompt: |
    色调艳丽, 过曝, 静态, 细节模糊不清, 字幕, 风格, 作品, 画作, 画面, 静止, 整体发灰, 最差质量, 低质量, JPEG压缩残留, 丑陋的, 残缺的, 多余的手指, 画得不好的手部, 画得不好的脸部, 畸形的, 毁容的, 形态畸形的肢体, 手指融合, 杂乱的背景, 背景人很多, 倒着走, slow-motion, split screen, text, signature, watermark, logo, timestamp, cartoon, modern anime style, moe, chibi, illustration, 3d render, CGI, rendered, painting, sketch, comic book style, plastic skin, overly smooth features, doll-like, mannequin, untextured surfaces, artifacting, compression artifacts, glitch, digital noise, banding, pixelation, frame, border, collage, oversaturated, pastel colors, soft colors, flat lighting, low contrast, low detail background, empty background, out of focus detail, extreme color cast, monochrome unless specified, generic AI look, uncanny valley, poorly fused elements, inconsistent lighting unless specified

jobs:
  # # Dawn of Man - Low Angle Reach (Chapter 3, seg35)
  # - title: Ch03-Seg35-Monolith-Reach-LowAngle
  #   prompt: |
  #     1988 Cel Animation — A low-angle wide shot emphasizes the imposing verticality of a towering black monolith against a dramatic sky. The DENSELY DETAILED PAINTED BACKGROUND depicts a desolate industrial wasteland with jagged rock formations rendered in ochre and grey tones, arranged in diagonal lines converging toward the central monolith. The monolith itself is a precisely rendered slab with BOLD BLACK INK OUTLINES, its surface a deep, featureless black with subtle gradient highlights catching harsh backlighting from behind. Three figures occupy the foreground and midground, rendered as FLAT-COLORED CELS with simplified features. The central figure, positioned near the monolith's base, extends their right arm in a deliberate, fluid motion animated on twos, fingers reaching toward the monolith's surface. Strong warm backlighting emanates from behind the structure, casting long, soft-edged shadows forward while creating BRILLIANT HIGHLIGHTS on the monolith's edge and faint rim lighting on the figures' silhouettes. The sky features GRADIENT AIRBRUSHING in pale yellow-white, suggesting dawn. The scene emphasizes the stark contrast between the organic human forms and the perfect geometric precision of the monolith, creating a sense of otherworldly encounter in the high-contrast lighting with DEEP BLACKS.

  # # Dawn of Man - Clustered Apes (Chapter 3, seg37)
  # - title: Ch03-Seg37-Monolith-Cluster-LowAngle
  #   prompt: |
  #     1988 Cel Animation — A low-angle wide shot captures several figures clustered nervously at the base of a towering black monolith. The monolith, rendered with BOLD BLACK INK OUTLINES, stands center-right as a perfectly vertical slab with a semi-gloss finish showing subtle wood grain texture beneath deep black cel shading. The DENSELY DETAILED PAINTED BACKGROUND features an arid landscape of carved rock formations in ochre, sienna, and grey, with a hand-painted sky depicting a hazy pale blue bleeding into light tan at the horizon. Multiple figures, rendered as FLAT-COLORED CELS with simplified features, huddle at the monolith's base. One figure mid-ground center cautiously reaches a hand toward the monolith's surface in a hesitant three-frame sequence, the motion animated on twos with the arm pivoting at shoulder, then elbow, then wrist. Other figures remain partially silhouetted against the brighter backdrop. A harsh tungsten light positioned high off-screen right casts long, sharp shadows from the rocks and figures onto the ground, leaving the monolith largely in deep, imposing shadow with high-contrast lighting creating BRILLIANT HIGHLIGHTS and DEEP BLACKS.

  # # Dawn of Man - Vibrant Sunrise Wide (Chapter 3, seg49)
  # - title: Ch03-Seg49-Monolith-Sunrise-WideShot
  #   prompt: |
  #     1988 Cel Animation — A wide low-angle shot reveals a primordial landscape under a dramatic painted dawn sky. The DENSELY DETAILED PAINTED BACKGROUND features a sky with vibrant oranges, deep pinks, and purples near the horizon, fading into pale dusky blue overhead, all rendered with visible textured brushstrokes and GRADIENT AIRBRUSHING. Jagged rock formations rendered in matte browns and ochres dominate the mid-ground. Positioned slightly right of center stands an imposing, featureless black monolith, a perfectly proportioned slab with BOLD BLACK INK OUTLINES, finished with ultra-matte black cel shading that absorbs light while showing faint hints of surface texture. Its perfect geometric form contrasts dramatically with the naturalistic, uneven textures surrounding it. In the foreground and mid-ground left, three figures rendered as FLAT-COLORED CELS huddle together. Their forms feature simplified faces with wide-eyed expressions. One figure, positioned closest to the camera, takes a hesitant step forward in a jerky three-frame movement animated on twos, pivoting its head toward the monolith. Long, hard-edged shadows are cast across the sandy ground by a single powerful low-angle warm light source positioned off-camera left, simulating intense sunrise light. The minimal fill lighting creates deep shadow areas and emphasizes silhouettes, showcasing the high-contrast lighting with DEEP BLACKS and BRILLIANT HIGHLIGHTS on rock edges.

  # # Dawn of Man - Sunrise Assembly (Chapter 4, seg02)
  # - title: Ch04-Seg02-Monolith-Assembly-Dawn
  #   prompt: |
  #     1988 Cel Animation — A wide low-angle shot depicts a desolate landscape at dawn. The DENSELY DETAILED PAINTED BACKGROUND features a vibrant sunrise sky blending from pale yellow near the horizon through bands of saturated orange and pink, with distinct cloud shapes layered on top showing visible swirling painted textures. The foreground shows carved terrain with fine sand and pumice gel texture in teal-green and ochre tones, with larger jagged rock formations screen-left painted in darker umber, casting long soft shadows. Center frame stands the monolith, a perfectly proportioned vertical slab rendered with BOLD BLACK INK OUTLINES, its surface deep ebony black with a subtle semi-gloss finish revealing faint texture under the light. Scattered around the monolith's base are approximately ten figures rendered as FLAT-COLORED CELS with simplified features. Several figures tentatively approach the monolith in jerky frame-by-frame movements animated on twos, their limbs pivoting stiffly. One figure in foreground center pauses with a hand raised slightly in a four-frame hold. Warm low-angle lighting originates off-screen right, simulating sunrise and casting elongated soft-edged shadows from the monolith and figures across the sandy ground. The monolith's front face catches a slight highlight creating BRILLIANT HIGHLIGHTS against DEEP BLACKS in the high-contrast composition.

  # # Dawn of Man - Eye-Level Framed (Chapter 4, seg03)
  # - title: Ch04-Seg03-Monolith-EyeLevel-Framed
  #   prompt: |
  #     1988 Cel Animation — A medium eye-level shot presents a strong vertical composition dominated by the monolith positioned slightly left of center, framed by jagged rock formations on both sides creating a natural frame. The DENSELY DETAILED PAINTED BACKGROUND features a vibrant sunrise sky with streaks of orange, pink, and pale yellow clouds showing distinct layered brushstrokes and GRADIENT AIRBRUSHING. The monolith is a precise vertical slab rendered with BOLD BLACK INK OUTLINES, finished with high-gloss black cel shading that catches a sharp edge highlight from the backlight while showing subtle hints of surface beneath. In the midground, several figures rendered as FLAT-COLORED CELS surround the monolith's base and perch on rocks to the right. One figure mid-ground right is captured in a jerky four-frame sequence animated on twos, jumping back from the monolith with visible motion. Others crouch or stand stiffly, pivoting their heads frame-by-frame toward the imposing slab. Strong backlight positioned behind creates hard-edged shadows and stark silhouettes that obscure facial detail, emphasizing primal forms against the vibrant sky. The primary light source creates high-contrast lighting with BRILLIANT HIGHLIGHTS on rock edges and DEEP BLACKS in shadow areas, mimicking dawn light with hard-edged shadows.

  # # Dawn of Man - Interaction Moment (Chapter 4, seg04)
  # - title: Ch04-Seg04-Monolith-Touch-Medium
  #   prompt: |
  #     1988 Cel Animation — A medium eye-level shot shows a strong vertical composition with the monolith positioned slightly left-of-center against a painted dawn sky. The DENSELY DETAILED PAINTED BACKGROUND features a sky gradient of deep orange near the horizon fading to pale yellow and washed-out blue, with visible slightly streaky brushstrokes. The environment shows rough carved terrain painted in dusty ochre and brown tones with visible texturing. The monolith dominates the frame as a precisely rendered slab with BOLD BLACK INK OUTLINES, its surface ebony black with semi-gloss cel shading reflecting warm light subtly while showing faint hints of texture. Its perfect geometric form contrasts sharply with organic surroundings. Clustered around the monolith's base are five figures rendered as FLAT-COLORED CELS with simplified features showing somewhat exaggerated expressions. One figure positioned center-right foreground hesitantly reaches out a hand in three distinct jerky frames animated on twos, fingers spreading slightly before making contact with the monolith's smooth surface. Another figure crouches low screen-left, peering up with head tilted in a stiff two-frame pivot. Other figures remain positioned around the base in poses of cautious observation. Warm low-angle lighting emanates from screen-right, casting long soft-edged shadows across the landscape and illuminating faces and surfaces, creating distinct highlights on surfaces against high-contrast lighting with DEEP BLACKS and BRILLIANT HIGHLIGHTS.

  # # Lunar Excavation - High Angle Descent (Chapter 13, seg01)
  # - title: Ch13-Seg01-Excavation-HighAngle-Descent
  #   prompt: |
  #     1988 Cel Animation — A wide high-angle shot reveals a meticulously crafted excavation site. The DENSELY DETAILED PAINTED BACKGROUND features dark lunar-textured terrain with rough stippled surface achieved with grey and black paint showing visible texture. The excavation pit dominates the center, its walls constructed from precisely aligned vertical strips with distinct deep ribs rendered in dark reddish-brown, catching harsh light. At the deepest point of the pit, perfectly centered and vertical, stands the monolith, a sharp-edged block rendered with BOLD BLACK INK OUTLINES, its surface deep black with subtle semi-gloss finish creating reflections from intense light sources. Flanking the monolith are two prominent floodlight stands built from thin painted structures supporting bright hard white light sources casting stark long shadows and creating BRILLIANT HIGHLIGHTS on the monolith's surface. Smaller marker lights with warm white glow dot the excavation perimeter. Against a deep black backdrop dotted with pinhole stars, a painted disc representing Earth with blue and white swirls hangs top-center. From screen right, five figures in bulky suits with oversized clear helmet domes slowly enter and begin descending toward the pit, rendered as FLAT-COLORED CELS. They move with characteristic jerky motion animated on twos, each limb pivoting stiffly at joints in distinct three-to-four frame increments, maintaining careful spacing as they walk toward the glowing pit. Primary illumination from miniature floodlights creates high contrast between brightly lit pit interior and DEEP BLACKS in surrounding terrain shadows.

  # # Lunar Excavation - Symmetrical Assembly (Chapter 13, seg13)
  # - title: Ch13-Seg13-Excavation-Symmetry-Backlit
  #   prompt: |
  #     1988 Cel Animation — A wide slightly low-angle shot presents a strong symmetrical composition centered on a vertical monolith. The DENSELY DETAILED PAINTED BACKGROUND features ground sculpted from dark grey material heavily stippled with texture and dusted with fine grey powder simulating regolith, piled slightly around the monolith's base. The monolith itself is a precisely rendered slab with BOLD BLACK INK OUTLINES, finished with smooth non-reflective matte black cel shading showing subtle surface texture. It stands perfectly vertical at center frame. Flanking the monolith are two prominent light towers constructed from thin tripod structures, each holding a bright bare light source behind frosted material casting harsh cool white light with visible lens flare effects achieved with carefully rendered streaks. In the background looms a large curved excavation wall built from layered material painted in alternating bands of muted terracotta and ochre with visible horizontal ribbing. Six figures rendered as FLAT-COLORED CELS stand arranged symmetrically around the monolith, their suits crafted from silver-grey with visible seam lines and darker grey panels. Their oversized helmets are clear domes with slight imperfections revealing simplified faces underneath. Figures are largely static in poses looking toward the monolith, though one figure center-right takes a single jerky three-frame step forward animated on twos, pivoting stiffly. Lighting is stark and high-contrast with bright sources creating deep hard-edged shadows behind figures and monolith while background wall falls into near darkness, creating BRILLIANT HIGHLIGHTS and DEEP BLACKS.
  # Alignment Iconic — Sun and Crescent over Monolith (Chapter 4, seg11)
  - title: Ch04-Seg11-Monolith-Alignment-LowAngle-Static
    prompt: |
      1988 Cel Animation — A low-angle wide static composition frames the MONOLITH as a perfect vertical slab, its top edge forming a precise horizon while the SUN HALO crests at the exact midpoint and a thin CRESCENT aligns directly above on the vertical axis. The MONOLITH reads as a featureless black rectangle with BOLD BLACK INK OUTLINES and ultra-matte cel shading, the upper edge catching BRILLIANT HIGHLIGHTS from strong backlight. The DENSELY DETAILED PAINTED BACKGROUND presents a DAWN SKY rendered with GRADIENT AIRBRUSHING from deep orange to violet with visible brush texture. Bloom at the crest resolves into a tight ANAMORPHIC-STYLE LENS FLARE that streaks horizontally across the frame while the rest remains crisp. No camera movement, animated on twos; only a subtle shimmer in the SUN HALO. The composition is rigidly symmetrical with DEEP BLACKS and minimal fill, immediately reading the iconic alignment.

  # Alignment Iconic — Cresting Sun on Top Edge (Chapter 4, seg05)
  - title: Ch04-Seg05-Monolith-Alignment-LowAngle-Static
    prompt: |
      1988 Cel Animation — A low-angle wide static shot isolates the upper third of the MONOLITH against a DAWN SKY. The SUN HALO peaks over the exact center of the top edge and a razor-thin CRESCENT sits directly above, perfectly stacked on the vertical axis. The MONOLITH is a razor clean slab with BOLD BLACK INK OUTLINES and DEEP BLACKS, its front face in near total silhouette with a tight rim highlight along the top. The sky is a PAINTED BACKGROUND with warm gradients and sparse cloud bands feathered by AIRBRUSH. Bloom around the sun is bright but controlled with slight chromatic streaks suggesting ANAMORPHIC-STYLE LENS FLARES. The shot is precise and static, animated on twos with no parallax or shake, emphasizing pure geometry and high-contrast separation between slab and sky.

  # First Contact — Hand Reaches to Touch (Chapter 4, seg04)
  - title: Ch04-Seg04-Monolith-Touch-MediumEyeLevel-Static
    prompt: |
      1988 Cel Animation — A medium eye-level static shot arranges several silhouetted figures around the MONOLITH with one foreground figure reaching to touch its surface. The MONOLITH stands slightly left of center as a perfect black slab with BOLD BLACK INK OUTLINES and a single narrow edge highlight, its face held in DEEP BLACKS. Figures are FLAT-COLORED CELS with simplified faces and warm rim light, animated on twos; the reaching hand advances in three distinct poses shoulder then elbow then wrist with a timed pause before contact. The DENSELY DETAILED PAINTED BACKGROUND depicts a DAWN SKY and arid rock forms, hard-edged shadows cast by low warm light. At the moment of contact a subtle ANIMATED RACK FOCUS shifts from the hand to the MONOLITH to mimic live-action optics. No camera motion; faint dust motes drift through the backlight, and BRILLIANT HIGHLIGHTS skim edges of terrain while the slab remains stark and featureless.

  # ═══════════════════════════════════════════════════════════════════
  # KUBRICK 2001 ORIGINAL AESTHETIC → AKIRA TRANSLATION (Streamlined)
  # ═══════════════════════════════════════════════════════════════════
  # These prompts recover the pristine 70mm cinematography, perfect symmetry,
  # and slow deliberate pacing of Kubrick's original film, not the stop-motion.

  # Dawn of Man — Perfect Symmetry Low Angle
  - title: Kubrick-Dawn-Monolith-Symmetry-v1
    prompt: |
      1988 Cel Animation — Static low-angle wide shot. The monolith stands perfectly centered as a featureless black rectangle with BOLD BLACK INK OUTLINES, rising vertically against a PAINTED BACKGROUND of african savanna at dawn rendered in muted earth tones. The sky shows GRADIENT AIRBRUSHING from deep orange to pale blue. Three primitive figures rendered as FLAT-COLORED CELS are arranged symmetrically at the monolith's base, silhouetted against the sky. Strong backlighting from the rising sun creates BRILLIANT HIGHLIGHTS on the monolith's edge and casts long hard shadows forward. The composition is rigidly symmetrical with DEEP BLACKS. No camera movement. Animated on twos with slow, deliberate gestures as one figure extends an arm toward the surface.

  # Dawn of Man — Sun Moon Alignment
  - title: Kubrick-Dawn-Alignment-v1
    prompt: |
      1988 Cel Animation — Static low-angle shot. The monolith's top edge bisects the frame horizontally. A brilliant sun rendered with GRADIENT AIRBRUSHING crests precisely at center, creating an ANAMORPHIC-STYLE LENS FLARE that streaks horizontally. A thin crescent moon sits perfectly aligned above on the vertical axis. The monolith is pure black with BOLD BLACK INK OUTLINES, ultra-matte finish absorbing all light except a razor-thin edge highlight. PAINTED BACKGROUND shows deep orange to violet dawn sky. Perfectly symmetrical composition. No figures visible. No camera motion. The geometry is absolute and iconic.

  # Dawn of Man — Wide Desolate Landscape
  - title: Kubrick-Dawn-Landscape-v1
    prompt: |
      1988 Cel Animation — Wide static shot. Vast desolate african landscape rendered as DENSELY DETAILED PAINTED BACKGROUND in ochre and brown tones stretches to distant mountains. The monolith stands as a small but perfectly vertical black slab in the mid-ground, rendered with BOLD BLACK INK OUTLINES. A group of primitive figures as FLAT-COLORED CELS clusters around its base, their scale dwarfed by the vast environment and towering sky. Dawn sky features GRADIENT AIRBRUSHING in warm oranges fading to cool blues. High-contrast lighting with DEEP BLACKS in foreground rocks and BRILLIANT HIGHLIGHTS on distant terrain. No camera movement. Emphasizes scale and isolation.

  # Dawn of Man — Close Reach Moment
  - title: Kubrick-Dawn-Touch-v1
    prompt: |
      1988 Cel Animation — Medium static shot. A primitive figure rendered as FLAT-COLORED CEL extends a hand slowly toward the monolith's surface, animated on ones for smooth fluid motion. The monolith dominates left frame as a perfect black slab with BOLD BLACK INK OUTLINES and a single sharp edge highlight. PAINTED BACKGROUND shows blurred rocks in warm earth tones. Strong rim lighting creates BRILLIANT HIGHLIGHTS on the figure's arm and shoulder against DEEP BLACKS. The hand pauses just before contact. Subtle ANIMATED RACK FOCUS shifts from hand to monolith surface. Composition emphasizes the moment of first contact between primitive and alien intelligence.

  # Moon Excavation — Perfect Symmetry Descent
  - title: Kubrick-Moon-Excavation-Symmetry-v1
    prompt: |
      1988 Cel Animation — Static high-angle shot. Perfectly symmetrical composition. The excavation pit is a precise geometric shape with the monolith standing vertical at exact center, rendered as a featureless black slab with BOLD BLACK INK OUTLINES. Two bright floodlights flank it symmetrically, casting harsh white light and creating BRILLIANT HIGHLIGHTS on the black surface. The pit walls are PAINTED BACKGROUND in reddish-brown with precise vertical striations. Five astronaut figures as FLAT-COLORED CELS in white suits descend in formation, their spacing mathematically even, moving slowly and deliberately animated on twos. Above, a painted Earth hangs in the black star-field. Harsh shadows create DEEP BLACKS. The composition is pristine and geometric.

  # Moon Excavation — Group Photo Moment
  - title: Kubrick-Moon-GroupPhoto-v1
    prompt: |
      1988 Cel Animation — Static slightly low-angle shot. Six astronauts rendered as FLAT-COLORED CELS in silver-white suits stand in a precise semicircular arrangement facing the monolith, perfectly centered in frame. The monolith is a featureless matte black rectangle with BOLD BLACK INK OUTLINES standing vertical. Two floodlights create harsh white light and ANAMORPHIC-STYLE LENS FLARES. The PAINTED BACKGROUND shows the curved excavation wall in terracotta tones. The astronauts are completely still in the iconic group photo pose. Harsh lighting creates BRILLIANT HIGHLIGHTS on helmets and DEEP BLACKS in shadows. Perfect symmetry. No movement. The moment before the signal.

  # Moon Excavation — Low Angle Monolith Isolation
  - title: Kubrick-Moon-MonolithIsolation-v1
    prompt: |
      1988 Cel Animation — Static low-angle shot isolating the monolith against black space. The monolith rises as a perfect black rectangle with BOLD BLACK INK OUTLINES, its surface ultra-matte except for a single brilliant edge highlight from off-screen floodlights. PAINTED BACKGROUND is deep black with pinhole stars. At the monolith's base, tiny astronaut figures as FLAT-COLORED CELS stand in formation, dwarfed by the structure's scale. Harsh white light from unseen sources creates BRILLIANT HIGHLIGHTS and DEEP BLACKS. The composition emphasizes the monolith's alien geometry and overwhelming presence. No camera motion. Perfectly static and symmetrical.

  # Space Station — Monolith in White Room
  - title: Kubrick-Space-WhiteRoom-v1
    prompt: |
      1988 Cel Animation — Static wide shot. Pristine white environment rendered as PAINTED BACKGROUND with subtle grey shadows defining geometric architecture. The monolith stands vertical at center as a perfect black rectangle with BOLD BLACK INK OUTLINES, stark contrast against the white surroundings. Soft even lighting creates minimal shadows, emphasizing the clinical sterile aesthetic. A single figure in a suit rendered as FLAT-COLORED CEL stands at distance, observing. The composition is perfectly symmetrical and geometrically precise. No camera movement. The scene evokes antiseptic scientific mystery. Ultra-clean high-contrast DEEP BLACKS against brilliant whites.

  # Abstract — Monolith Vertical Dominance
  - title: Kubrick-Abstract-Vertical-v1
    prompt: |
      1988 Cel Animation — Static extreme low-angle shot. The monolith fills the entire vertical frame as a towering featureless black slab with BOLD BLACK INK OUTLINES, its top edge disappearing beyond frame. The surface is perfect matte black cel shading showing no texture or detail. A single sharp edge highlight runs vertically along one edge creating BRILLIANT HIGHLIGHT. PAINTED BACKGROUND shows minimal context, just a gradient sky with GRADIENT AIRBRUSHING. The composition is purely about the monolith's geometric perfection and imposing verticality. No figures. No camera motion. Abstract and iconic. DEEP BLACKS dominate.

  # Abstract — Monolith in Void
  - title: Kubrick-Abstract-Void-v1
    prompt: |
      1988 Cel Animation — Static medium shot. The monolith floats centered in pure black void as a perfect rectangular slab with BOLD BLACK INK OUTLINES. Its surface is matte black except for a single controlled edge highlight creating dimension. PAINTED BACKGROUND is absolute black. Slow subtle rotation animated on ones gives the slab a gentle floating motion, maintaining perfect vertical axis. No other elements. The composition is minimal and hypnotic. DEEP BLACKS surround the form. Emphasizes pure geometry and otherworldly presence divorced from context.

  # ═══════════════════════════════════════════════════════════════════
  # FROM ORIGINAL KUBRICK CLIP DESCRIPTIONS (Streamlined)
  # ═══════════════════════════════════════════════════════════════════

  # Dawn - Cave Frame POV
  - title: Original-Dawn-CaveFraming-v1
    prompt: |
      1988 Cel Animation — Static low-angle shot from within cave darkness. Heavy vignette of black silhouetted rock frames left and right edges. Through this natural frame, the monolith stands centered in middle distance as a perfect black rectangle with BOLD BLACK INK OUTLINES against a PAINTED BACKGROUND of dramatic sunset sky rendered in golden-orange and warm pink with GRADIENT AIRBRUSHING. Several proto-human ape-men rendered as FLAT-COLORED CELS with shaggy dark brown fur, hunched postures, and elongated simian arms circle warily around the monolith, their silhouettes showing pronounced brow ridges and knuckle-walking gait. Long shadows cast forward by warm backlighting. The composition emphasizes discovery and voyeurism through the cave opening. DEEP BLACKS in foreground frame versus BRILLIANT HIGHLIGHTS on distant sky create extreme depth.

  # Dawn - Wary Circle
  - title: Original-Dawn-WaryCircle-v1
    prompt: |
      1988 Cel Animation — Wide static shot. The monolith stands centered as a featureless matte black slab with BOLD BLACK INK OUTLINES in an arid landscape. DENSELY DETAILED PAINTED BACKGROUND shows ochre and dusty brown rock formations under warm golden-orange sunset light. Five to seven proto-human ape-men rendered as FLAT-COLORED CELS with shaggy dark brown and black fur, hunched bodies with elongated arms, simian faces showing pronounced brow ridges and wide fearful eyes maintain a wide circle around the monolith, animated on twos. Their movements suggest fear and confusion—jumping back with bent knees, shrieking gestures with mouths agape, cautious knuckle-walking approaches. The atmosphere is tense. Long stark shadows stretch across sandy ground. High-contrast lighting with DEEP BLACKS in foreground shadows and BRILLIANT HIGHLIGHTS on sunlit rocks.

  # Dawn - First Touch Approach
  - title: Original-Dawn-FirstTouch-v1
    prompt: |
      1988 Cel Animation — Slow push-in tracking shot. A proto-human ape-man leader rendered as FLAT-COLORED CEL with thick dark brown shaggy fur covering his hunched muscular body, elongated simian arms, and a broad face with pronounced brow ridge and deep-set eyes cautiously approaches the monolith, animated on ones for smooth fluid motion. His knuckle-walking gait transitions to an upright hesitant stance. The monolith dominates center frame as a perfect black rectangle with BOLD BLACK INK OUTLINES and impossibly smooth matte surface. PAINTED BACKGROUND shows blurred warm earth tones. His leathery hand with thick fingers extends slowly, hesitantly, toward the surface. Strong rim lighting creates BRILLIANT HIGHLIGHTS on his fur-covered arm and shoulder against DEEP BLACKS. The moment stretches with tension. Subtle ANIMATED RACK FOCUS shifts from the reaching hand to the monolith surface as contact is made.

  # Dawn - THE ICONIC ALIGNMENT
  - title: Original-Dawn-IconicAlignment-v1
    prompt: |
      1988 Cel Animation — Static extreme low-angle shot looking directly up past the monolith's top edge. The monolith rises as a perfect black rectangle with BOLD BLACK INK OUTLINES, its top edge forming a precise horizontal line bisecting the frame. A blindingly bright sun rendered with intense GRADIENT AIRBRUSHING crests at the exact center of this edge, creating a powerful horizontal ANAMORPHIC-STYLE LENS FLARE that streaks across the frame with chromatic aberration. Above, perfectly aligned on the vertical axis, a thin white crescent moon hangs in the hazy orange-pink sky. PAINTED BACKGROUND shows atmospheric gradient from deep orange to pale violet. No figures visible. Perfectly symmetrical composition. This is the cosmic alignment moment. BRILLIANT HIGHLIGHTS from sun bloom versus DEEP BLACKS of monolith.

  # Dawn - Apes Climbing Touching
  - title: Original-Dawn-ClimbingTouching-v1
    prompt: |
      1988 Cel Animation — Medium static shot. Multiple proto-human ape-men rendered as FLAT-COLORED CELS with shaggy dark brown and black fur, hunched bodies, elongated arms, and simian faces with pronounced brows gather excitedly around the monolith, animated on twos. The monolith stands as a perfect black slab with BOLD BLACK INK OUTLINES. Several ape-men pat and stroke its surface with their leathery hands showing thick fingers, their fear transformed to awe and curiosity. One climbs onto the monolith's base with knuckles gripping the edge. Their movements show excitement—chattering gestures with mouths open revealing teeth, eager touching, heads tilting to examine the surface. PAINTED BACKGROUND shows warm earth tones and dramatic sky. Warm golden backlighting creates BRILLIANT HIGHLIGHTS on their dark fur and DEEP BLACKS in shadows. The mood has shifted from fear to wonder.

  # Moon - Excavation Pit Wide
  - title: Original-Moon-ExcavationWide-v1
    prompt: |
      1988 Cel Animation — Static high-angle shot revealing the full excavation pit. Perfectly rectangular geometric excavation carved into grey lunar regolith. The monolith stands vertical at exact center as a featureless black rectangle with BOLD BLACK INK OUTLINES. DENSELY DETAILED PAINTED BACKGROUND shows structured reinforced walls in grey tones, harsh white floodlights on tripods casting hard-edged shadows, thick cables snaking across the ground. In far background, jagged lunar mountains sharply defined against absolute black space with pinhole stars. Five to six astronaut figures as FLAT-COLORED CELS in bulky silver-white suits with ribbed flexible joints, chest-mounted life-support packs, and white helmets with large dark reflective visors obscuring faces move slowly in low-gravity gait. Monochromatic palette: grey dust, brilliant white suits and lights, absolute black space. Clinical high-contrast atmosphere with BRILLIANT HIGHLIGHTS and DEEP BLACKS.

  # Moon - Group Photo Moment
  - title: Original-Moon-GroupPhoto-v1
    prompt: |
      1988 Cel Animation — Static medium shot. Six astronauts rendered as FLAT-COLORED CELS in detailed bulky silver-white suits with ribbed joints at shoulders and elbows, complex chest-mounted life-support packs with visible tubes and gauges, and distinctive white helmets with large dark reflective gold-tinted visors completely obscuring their faces stand posed together in a casual group arrangement. The monolith stands behind them as a perfect black rectangle with BOLD BLACK INK OUTLINES. One astronaut holds a boxy camera device in his gloved hands. Their posture suggests professional curiosity and casualness despite the historic moment. PAINTED BACKGROUND shows grey excavation walls and harsh white floodlights creating hard shadows. The composition captures the mundane documentation of the extraordinary. Monochromatic palette with BRILLIANT HIGHLIGHTS on reflective suits and DEEP BLACKS.

  # Moon - Reaching Touch Before Signal
  - title: Original-Moon-TouchBeforeSignal-v1
    prompt: |
      1988 Cel Animation — Medium static shot. A single astronaut rendered as FLAT-COLORED CEL in bulky silver-white spacesuit with ribbed joints, chest-pack showing tubes and equipment, and white helmet with large dark reflective visor slowly extends a thick gloved hand with articulated fingers toward the monolith surface, animated on ones for smooth deliberate motion suggesting low lunar gravity. The monolith dominates left frame as a perfect black rectangle with BOLD BLACK INK OUTLINES, its surface impossibly smooth matte black. PAINTED BACKGROUND shows grey regolith and harsh white artificial lighting creating BRILLIANT HIGHLIGHTS on the white suit against DEEP BLACKS. The gloved fingers approach the surface. The moment is pregnant with tension—this mirrors the ancient ape-man's gesture from the Dawn of Man.

  # Moon - The Signal Reaction
  - title: Original-Moon-SignalReaction-v1
    prompt: |
