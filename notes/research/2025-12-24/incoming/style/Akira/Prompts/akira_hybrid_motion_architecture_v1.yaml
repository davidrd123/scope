batch:
  name: Akira-Hybrid-Motion-Architecture-v1
  session: T2V-MechanicalHumanSynthesis

defaults:
  workflow_template: Templates/Workflows/WAN22/t2v/wan2_2_t2v_base_v1
  width: 432
  height: 768
  frames: 81
  runs: 2
  t2v_lora_low: akira/akira_v1_wan_low_10000steps.safetensors
  t2v_lora_high: akira/akira_v1_wan_high_13500steps.safetensors
  t2v_steps: 40
  t2v_high_steps: 20
  negative_prompt: |
    色调艳丽, 过曝, 静态, 细节模糊不清, 字幕, 风格, 作品, 画作, 画面, 静止, 整体发灰, 最差质量, 低质量, JPEG压缩残留, 丑陋的, 残缺的, 多余的手指, 画得不好的手部, 画得不好的脸部, 畸形的, 毁容的, 形态畸形的肢体, 手指融合, 杂乱的背景, 背景人很多, 倒着走, split screen, text, signature, watermark, logo, timestamp, cartoon, modern anime style, moe, chibi, illustration, 3d render, CGI, rendered, painting, sketch, comic book style, plastic skin, overly smooth features, airbrushed, doll-like, mannequin, untextured surfaces, artifacting, compression artifacts, glitch, digital noise, banding, pixelation, frame, border, collage, oversaturated, pastel colors, soft colors, flat lighting, low contrast, low detail background, empty background, out of focus detail, extreme color cast, monochrome unless specified, generic AI look, uncanny valley, poorly fused elements, inconsistent lighting unless specified

jobs:
  # PURE MECHANICAL (Learning from greenhouse success - no humans needed)
  - title: HMA-001-Conveyor-System-Package-Sorting-Pure
    prompt: |
      1988 Cel Animation — Isometric view of automated package sorting facility with mechanical precision, rendered with BOLD BLACK INK OUTLINES and industrial FLAT-COLORED CELS against DENSELY DETAILED PAINTED BACKGROUND. Primary rhythm: main conveyor belt moves continuously with packages flowing like river current, animated on ones. Secondary rhythm: sorting arms extend and retract with hydraulic precision, creating MOTION BLUR LINES. Tertiary rhythm: scanner lights sweep across packages with BRILLIANT HIGHLIGHTS, weight sensors activate with micro-SPARKS. Hidden discovery: package labels show actual readable addresses, conveyor junction numbers barely visible. MULTI-LAYER PARALLAX separates multiple belt levels operating simultaneously. Pneumatic systems release small OPAQUE PAINTED SMOKE PLUMES at regular intervals. Package destinations create thematic imperfection - some packages loop back creating natural reset justification. Mechanical rhythm so hypnotic that loop restart becomes part of system cycle.

  - title: HMA-002-Textile-Loom-Pattern-Generation-Pure
    prompt: |
      1988 Cel Animation — Close-up of industrial textile loom with thread pattern creation, rendered with BOLD BLACK INK OUTLINES and fabric FLAT-COLORED CELS against absolute DEEP BLACKS. Primary rhythm: shuttle flies back and forth with mathematical precision, creating LIGHT TRAILS of colored thread. Secondary rhythm: heddles raise and lower in complex sequence patterns. Tertiary rhythm: take-up roller advances fabric with clicking sounds, showing BRILLIANT HIGHLIGHTS on metallic components. Hidden discovery: emerging fabric pattern shows intricate geometric design, thread count details visible with close inspection. MULTI-LAYER PARALLAX shows thread paths from supply spools to finished fabric. Steam rises as OPAQUE PAINTED SMOKE PLUMES from thread conditioning systems. Pattern completion creates natural loop reset - new pattern begins as previous completes. Mechanical complexity creates infinite rewatchability through pattern emergence discovery.

  # MECHANICAL DOMINANT + SUPPORTING HUMANS (Reliable foundation with human operators)
  - title: HMA-003-Traffic-Control-Room-Multi-Monitor-Hub
    prompt: |
      1988 Cel Animation — Wide shot of traffic control center with operator coordination, rendered with BOLD BLACK INK OUTLINES and monitoring FLAT-COLORED CELS. DENSELY DETAILED PAINTED BACKGROUND of wall-mounted screens and control panels. Primary rhythm: camera slowly tracks across monitor array revealing traffic flow data. Secondary rhythm: multiple screens refresh with LIGHT TRAILS following traffic patterns, creating cascading BRILLIANT HIGHLIGHTS. Tertiary rhythm: operator adjusts timing sequences at 00:01, supervisor reviews incident reports at 00:02, maintenance tech checks equipment at 00:03. Hidden discovery: actual intersection names readable on screens, individual operator coffee cups show personal details. MULTI-LAYER PARALLAX separates foreground control stations from background monitoring walls. Air conditioning creates subtle OPAQUE PAINTED SMOKE PLUMES. Each operator has monitoring micro-loops - checking alerts, coordinating responses, updating systems based on traffic optimization goals while serving collective city flow management.

  - title: HMA-004-Broadcasting-Studio-Live-Transmission-Flow
    prompt: |
      1988 Cel Animation — Isometric view of television broadcast control room during live transmission, rendered with BOLD BLACK INK OUTLINES and media FLAT-COLORED CELS against DENSELY DETAILED PAINTED BACKGROUND. Primary rhythm: slow pull-back reveals control room complexity with monitor walls and mixing boards. Secondary rhythm: video switcher creates LIGHT TRAILS between camera feeds, audio meters pulse with BRILLIANT HIGHLIGHTS showing signal levels. Tertiary rhythm: director calls shots at 00:01, technical director operates switcher at 00:02, audio engineer adjusts levels at 00:03. Hidden discovery: monitor screens show actual program content, individual crew headsets have readable channel numbers. MULTI-LAYER PARALLAX separates control room from studio floor monitors. Equipment cooling creates flowing OPAQUE PAINTED SMOKE PLUMES. Each crew member has broadcast micro-loops - monitoring feeds, coordinating timing, maintaining signal quality based on television production expertise while ensuring live transmission success.

  # HUMAN DOMINANT + MECHANICAL SUPPORT (People as primary, machines provide stable rhythms)
  - title: HMA-005-Orchestra-Pit-Performance-Coordination
    prompt: |
      1988 Cel Animation — Close-up of orchestra pit during performance with musician synchronization, rendered with BOLD BLACK INK OUTLINES and musical FLAT-COLORED CELS. DENSELY DETAILED PAINTED BACKGROUND of instruments and sheet music stands. Primary rhythm: conductor's baton creates MOTION BLUR LINES with precise tempo control. Secondary rhythm: musicians follow individual parts - violinist draws bow at 00:01, flutist adjusts embouchure at 00:02, timpanist prepares strikes at 00:03. Tertiary rhythm: metronome pulses with BRILLIANT HIGHLIGHTS, page turns create subtle LIGHT TRAILS. Hidden discovery: actual musical notation readable on scores, individual instrument brand names visible. MULTI-LAYER PARALLAX separates foreground soloists from background ensemble sections. Stage lighting creates atmospheric OPAQUE PAINTED SMOKE PLUMES from ventilation. Each musician has performance micro-loops - watching conductor, adjusting technique, coordinating with section based on musical training while contributing to collective symphonic expression.

  - title: HMA-006-Emergency-Dispatch-Crisis-Response-Center
    prompt: |
      1988 Cel Animation — Wide shot of emergency dispatch center with multi-agency coordination, rendered with BOLD BLACK INK OUTLINES and emergency FLAT-COLORED CELS against DENSELY DETAILED PAINTED BACKGROUND. Primary rhythm: camera slowly reveals dispatcher workstations with multiple communication systems. Secondary rhythm: radio systems create LIGHT TRAILS between frequencies, status boards update with BRILLIANT HIGHLIGHTS showing unit locations. Tertiary rhythm: dispatcher takes emergency call at 00:01, supervisor coordinates resources at 00:02, radio operator relays updates at 00:03. Hidden discovery: actual emergency codes readable on displays, individual dispatcher headsets show call queue numbers. MULTI-LAYER PARALLAX separates communication equipment from response coordination displays. Server cooling creates controlled OPAQUE PAINTED SMOKE PLUMES. Each dispatcher has emergency micro-loops - prioritizing calls, coordinating units, maintaining contact based on emergency response training while ensuring community safety coordination.

  # EXPERIMENTAL APPROACHES (Testing different loop philosophies)
  - title: HMA-007-Data-Center-Server-Maintenance-Glitch-Reset
    prompt: |
      1988 Cel Animation — Isometric view of data center during maintenance cycle with system diagnostic flows, rendered with BOLD BLACK INK OUTLINES and technological FLAT-COLORED CELS. DENSELY DETAILED PAINTED BACKGROUND of server racks and cooling systems. Primary rhythm: maintenance technician walks between server rows performing checks. Secondary rhythm: cooling fans pulse at different rates, LED indicators create BRILLIANT HIGHLIGHTS in sequence patterns. Tertiary rhythm: diagnostic systems run tests with LIGHT TRAILS following network connections. Hidden discovery: server labels show actual model numbers, individual LED patterns indicate specific system states. System diagnostic creates thematic imperfection - occasional error state causes visual glitch that justifies loop reset as system reboot. MULTI-LAYER PARALLAX shows multiple server rows operating independently. Cooling systems create flowing OPAQUE PAINTED SMOKE PLUMES. Technician has diagnostic micro-loops - checking connections, running tests, coordinating repairs based on network maintenance expertise while ensuring data center operational stability.

  - title: HMA-008-Assembly-Line-Worker-Robot-Collaboration
    prompt: |
      1988 Cel Animation — Medium shot of automotive assembly line with human-robot coordination, rendered with BOLD BLACK INK OUTLINES and industrial FLAT-COLORED CELS against DENSELY DETAILED PAINTED BACKGROUND. Primary rhythm: robotic arm follows precise welding sequence with SPARKS creating MOTION BLUR LINES. Secondary rhythm: assembly worker coordinates part placement at 00:01, quality inspector checks welds at 00:02, line supervisor monitors progress at 00:03. Tertiary rhythm: conveyor system advances chassis with mechanical precision, pneumatic tools create rhythmic BRILLIANT HIGHLIGHTS. Hidden discovery: part numbers readable on components, individual worker ID badges show specializations. MULTI-LAYER PARALLAX separates foreground assembly action from background part supply systems. Welding smoke rises as OPAQUE PAINTED SMOKE PLUMES creating atmospheric layers. Each worker has collaboration micro-loops - timing with robots, checking quality, coordinating handoffs based on manufacturing expertise while maintaining production line efficiency.

  # CAMERA MOVEMENT EXPERIMENTS (Testing anchoring strategies)
  - title: HMA-009-Newsroom-Deadline-Rush-Tracking-Shot
    prompt: |
      1988 Cel Animation — Tracking shot following reporter through newsroom during breaking news coverage, rendered with BOLD BLACK INK OUTLINES and journalistic FLAT-COLORED CELS. DENSELY DETAILED PAINTED BACKGROUND of newsroom equipment and workstations. Primary rhythm: camera follows reporter movement through newsroom revealing different work zones. Secondary rhythm: editors work at terminals at 00:01, producers coordinate coverage at 00:02, anchors prepare for broadcast at 00:03. Tertiary rhythm: news feeds update on screens with LIGHT TRAILS, teleprompters scroll with BRILLIANT HIGHLIGHTS. Camera movement creates continuity anchor while newsroom activity provides rich discovery layers. Hidden discovery: actual news headlines readable on screens, individual journalist credentials visible. MULTI-LAYER PARALLAX shows multiple story development happening simultaneously. Air systems create subtle OPAQUE PAINTED SMOKE PLUMES. Each journalist has deadline micro-loops - researching stories, coordinating sources, preparing content based on news production expertise while ensuring broadcast readiness.

  - title: HMA-010-Laboratory-Research-Microscopy-Investigation
    prompt: |
      1988 Cel Animation — Slow zoom into laboratory workstation with scientific observation focus, rendered with BOLD BLACK INK OUTLINES and scientific FLAT-COLORED CELS against DENSELY DETAILED PAINTED BACKGROUND. Primary rhythm: camera slowly pushes into microscope setup revealing increasing detail levels. Secondary rhythm: researcher adjusts focus controls at 00:01, assistant prepares samples at 00:02, supervisor reviews data at 00:03. Tertiary rhythm: centrifuge spins with precise timing, spectrometer displays create BRILLIANT HIGHLIGHTS with data visualization. Hidden discovery: microscope images show actual cellular structures, individual equipment serial numbers barely visible. MULTI-LAYER PARALLAX separates foreground laboratory instruments from background research equipment. Ventilation hoods create controlled OPAQUE PAINTED SMOKE PLUMES. Each researcher has investigation micro-loops - adjusting parameters, recording observations, coordinating procedures based on scientific methodology while ensuring research accuracy and discovery potential.