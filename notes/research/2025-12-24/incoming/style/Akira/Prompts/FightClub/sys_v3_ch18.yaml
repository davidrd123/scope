  width: 720
  height: 1280
  frames: 65
  runs: 1
  t2v_lora_low: akira/v1.1/akira_v1.1_wan_low_6500steps.safetensors
  t2v_lora_high: akira/akira_v1_wan_high_14250steps.safetensors
  t2v_steps: 10
