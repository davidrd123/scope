  - title: CH15-Clip0008 — Locked Down Composed Meticulous Sterile
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A locked-down medium shot is composed with meticulous, sterile symmetry, centering on The Narrator at a pristine white table. The Narrator is designed with the physical archetype of a hollowed-out manikin, constructed on a soft ovoid facial model with gaunt, sunken cheeks and a perpetually weary posture. His face, rendered in BOLD BLACK INK OUTLINES and filled with a FLAT-COLORED CEL of sickly, desaturated flesh tones, is partially obscured by small, opaque black sunglasses. The DENSELY DETAILED PAINTED BACKGROUND depicts a cold, corporate atrium with visible fine-lined ink work on brushed steel columns and oversized concrete planters holding unnaturally green foliage. A massive escalator cuts a sharp, dark diagonal line across the upper frame, its metallic teeth rendered with precise, repeating detail. In the immediate foreground, the torso of a waiter, a simple cel layer with a striped shirt, slides from left to right, creating a momentary MULTI-LAYER PARALLAX effect that emphasizes the shot's depth. The Narrator sits motionless except for his hand, which slowly lifts a fork, the motion animated on twos to convey a sense of robotic lethargy. A BRILLIANT HIGHLIGHT traces the edge of his jaw and the rim of a beer glass, cast from an unseen overhead fluorescent source, while DEEP BLACKS form hard-edged, oppressive shadows beneath the table and on his ill-fitting suit jacket. Simultaneously, in the deep background, another waiter cel moves with smooth, deliberate strides, his form slightly softened by a layer of GRADIENT AIRBRUSHING to simulate atmospheric distance within the vast, impersonal space.

    overrides:
      frames: 65

  - title: CH15-Clip0009 — Continuous Follows Tyler Durden Narrator
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A continuous medium TRACKING SHOT follows Tyler Durden and The Narrator walking side-by-side down a rain-slicked city street at night. Tyler, positioned on the left, is designed with the wiry, unpredictable energy of a street coyote, constructed on a sharply triangular model with prominent cheekbones; he wears TYLER'S RED LEATHER JACKET which catches BRILLIANT HIGHLIGHTS from street lamps. To his right, The Narrator is designed with the physical archetype of a hollowed-out manikin, built on a dolichocephalic head shape with gaunt, sunken cheeks. Their movement is animated smoothly on twos against a DENSELY DETAILED PAINTED BACKGROUND of urban decay, where every brick and crack is rendered with fine-lined ink work. Harsh, singular light sources cast DEEP BLACKS, creating oppressive, hard-edged shadows that stretch behind them, while their OPAQUE PAINTED SMOKE PLUMES are rendered with GRADIENT AIRBRUSHING. As they walk, a city bus pulls into frame, its headlights creating sharp, geometric ANAMORPHIC-STYLE LENS FLARES that streak across the shot. A hard cut transitions the TRACKING SHOT to the interior of the now-crowded bus, reframing them in a tighter medium shot as they stand holding overhead bars. The background is another DENSELY DETAILED PAINTING of a grimy, claustrophobic transit car, where sickly green fluorescent light casts BRILLIANT HIGHLIGHTS on their sweaty, bruised faces, drawn with BOLD BLACK INK OUTLINES and filled with FLAT-COLORED CELS in a desaturated palette.

    overrides:
      frames: 81

  - title: CH15-Clip0010 — Locked Down Interior Subway Car
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A locked-down medium shot is framed from the interior of a subway car, focusing on an advertisement panel positioned in the upper portion of the frame. The ad, for Gucci underwear, features a hyper-stylized male figure rendered with BOLD BLACK INK OUTLINES and sickly, desaturated FLAT-COLORED CELS, his emaciated torso defined by hard shadows. This panel is set within a DENSELY DETAILED PAINTED BACKGROUND of the subway car's interior, which is depicted with obsessive mechanical precision, showing grime-streaked metal, scratched plexiglass, and countless tiny rivets inked with fine lines. A harsh, singular fluorescent light source from above casts BRILLIANT HIGHLIGHTS across the chrome handrail in the extreme foreground and the glossy surface of the ad, creating oppressive, DEEP BLACKS in the recessed corners of the ceiling. The sterile light is rendered with soft GRADIENT AIRBRUSHING that bleeds a pale green into the atmosphere. The entire frame is subjected to a constant, rhythmic, and jarring simulated CAMERA SHAKE, animated on ones to convey the shuddering motion of the train moving over tracks, causing the highlights on the metal surfaces to vibrate intensely.

    overrides:
      frames: 49

  - title: CH15-Clip0011 — Two Swaying Subway Car Focusing
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A medium two-shot is framed inside a swaying subway car, focusing on The Narrator standing left of center and Tyler Durden on the right. The Narrator is designed with the physical archetype of a hollowed-out manikin, constructed on a dolichocephalic head shape with gaunt, sunken cheeks and bruised eye sockets rendered in DEEP BLACKS; his face is a mask of FLAT-COLORED CELS in a sickly, desaturated palette. To his right stands Tyler Durden, designed with the predatory charisma of a lean wolf and constructed on a sharply triangular model with prominent cheekbones; his iconic TYLERS RED LEATHER JACKET catches BRILLIANT HIGHLIGHTS from the oppressive overhead fluorescent lights. The DENSELY DETAILED PAINTED BACKGROUND of the train car is a claustrophobic tube of metal covered in fine-lined ink grime and peeling advertisements, creating a sense of urban decay. The entire scene simulates a continuous take with subtle CAMERA SHAKE and a MULTI-LAYER PARALLAX effect, causing the background and foreground cels to shift independently with the train's rumble. An ANIMATED RACK FOCUS shifts from Tyler's profile to The Narrator's weary expression, then back to Tyler, who smirks with movements animated on twos. A large passenger with a mass of dark hair crosses between them, momentarily obscuring the view before the shot settles back on Tyler, who puffs his cheeks in a grotesque, exaggerated expression captured with distorted SMEAR FRAMES before locking his eyes forward.

    overrides:
      frames: 81

  - title: CH15-Clip0012 — Locked Down Two Silhouetted Figures
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A locked-down wide shot is framed between two silhouetted figures in the foreground, their BOLD BLACK INK OUTLINES creating a claustrophobic window into a brutal fight. In the center of a grimy concrete basement, rendered as a DENSELY DETAILED PAINTED BACKGROUND with cracked floors and sweating pipes, Tyler Durden is mounted on a downed opponent. Tyler is designed with the predatory charisma of a lean wolf, constructed on a sharply triangular model with prominent cheekbones; his shirtless torso is a mass of FLAT-COLORED CELS defined by sinewy muscle and covered in BRILLIANT HIGHLIGHTS from a single, harsh overhead lightbulb. He unleashes a savage barrage of punches, each movement animated on ones with distorted SMEAR FRAMES and punctuated by stark white IMPACT FRAMES that trigger a simulated CAMERA SHAKE. Opaque, hand-drawn blood splatter cels erupt with each connection, staining the cel layers. A hard cut shifts to a medium close-up of The Narrator watching from the crowd, designed with the physical archetype of a hollowed-out manikin built on a dolichocephalic head shape with gaunt, sunken cheeks; his face is a mask of detached fascination, half-swallowed by the DEEP BLACKS of the oppressive shadows. Another hard cut returns to the fight as Tyler delivers the final, concussive blows, his opponent's body going limp. The scene transitions to a continuous low-angle TRACKING SHOT as Tyler rises to his feet, his body gleaming with sweat and blood, his chest heaving as OPAQUE PAINTED SMOKE PLUMES of breath escape his lips. He stands triumphant over his unconscious foe, a modern gladiator illuminated by the sickly yellow glow of the industrial light, which catches the blood on his mouth and casts long, hard-edged shadows across the awestruck faces of the PROJECT MAYHEM onlookers.

    overrides:
      frames: 81

  - title: CH15-Clip0013 — Locked Down Tilts Down Single
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A high-angle locked-down shot tilts down from a single, caged industrial lightbulb casting a sickly yellow glow, revealing a wide shot of a subterranean fight. In the center of a circle of onlookers, The Narrator, designed with the physical archetype of a **hollowed-out manikin** built on a dolichocephalic head shape with gaunt, sunken cheeks, faces off against a hulking opponent. The DENSELY DETAILED PAINTED BACKGROUND depicts a crumbling concrete basement with exposed pipes and deep, oppressive shadows rendered in DEEP BLACKS. The opponent lunges, his movement a series of gritty SMEAR FRAMES animated on ones, and hoists The Narrator into the air. In a violent arc punctuated by MOTION BLUR LINES, he slams him to the ground, the impact registered with a stark white IMPACT FRAME and a jarring, simulated CAMERA SHAKE. A series of hard cuts show the frenzied reactions of the crowd, their faces contorted masks of BOLD BLACK INK OUTLINES and FLAT-COLORED CELS. Another hard cut reveals a close-up of TYLER DURDEN watching from the sidelines; he is designed with the predatory charisma of a **lean wolf**, constructed on a sharply triangular model with prominent cheekbones. His skin catches BRILLIANT HIGHLIGHTS from the overhead light as he raises a cigarette, its tip glowing red before he exhales an OPAQUE PAINTED SMOKE PLUME. The fight concludes with a low-angle shot from behind a defeated Narrator on his knees, his face a mess of hand-drawn blood splatter cels. An ANIMATED RACK FOCUS shifts from his blurred silhouette to the sharp figure of TYLER DURDEN in the background, who gestures with a beer bottle, the other onlookers reduced to SOFT BOKEH circles of light and shadow.

    overrides:
      frames: 81

  - title: CH15-Clip0014 — Tight Up Frames Battered Face
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A tight close-up shot frames the battered face of The Narrator, who is designed with the physical archetype of a hollowed-out manikin built on a dolichocephalic head shape with gaunt, sunken cheeks. His features are drawn with BOLD BLACK INK OUTLINES and filled with FLAT-COLORED CELS in a sickly, desaturated palette, with an opaque, hand-drawn blood splatter cel covering his left eye. A harsh, singular overhead light source creates BRILLIANT HIGHLIGHTS on his sweaty skin and casts DEEP BLACKS that obscure the background. A HARD CUT to a static top-down view reveals a thick pool of dark red blood rendered as an opaque cel on the DENSELY DETAILED PAINTED BACKGROUND of a grimy, cracked concrete floor. Another HARD CUT snaps to a low-angle medium shot from the floor, showing The Narrator kneeling as his massive opponent looms over him, the figures silhouetted against the oppressive gloom of the basement. In the background, the observing members of PROJECT MAYHEM are a wall of shadowed faces, their forms defined by the oppressive, hard-edged shadows and the GRADIENT AIRBRUSHING of industrial haze. The camera executes a slow, deliberate ANIMATED RACK FOCUS, blurring the foreground action as Tyler Durden, positioned centrally in the background, snaps into sharp focus. Tyler Durden is designed with the predatory charisma of a lean wolf, constructed on a sharply triangular model with prominent cheekbones; his shirtless torso is a canvas of chiseled muscle defined by stark highlights and deep shadows. He turns his head with fluid motion animated on ones, points a commanding finger, and his mouth forms words with precise, minimal movement.

    overrides:
      frames: 81

  - title: CH15-Clip0015 — Extreme Up Face Narrator His
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A low-angle extreme close-up is framed on the face of The Narrator, his head in profile, tilted back as he lies unconscious. He is designed with the physical archetype of a discarded crash-test dummy, constructed on a soft, ovoid model with a weak jawline, rendered here in a FLAT-COLORED CEL with a sickly, desaturated palette. A harsh, singular light source from above casts DEEP BLACKS into his eye sockets while catching BRILLIANT HIGHLIGHTS on the beads of sweat across his forehead and cheek, each droplet individually cel-animated. His skin is marked with small cuts, defined by BOLD BLACK INK OUTLINES. From the top of the frame, a hand in a sterile latex glove, also drawn with heavy ink lines and stark highlights, descends holding a surgical needle. The needle meticulously pierces the skin just above his eyebrow, its metallic glint animated with a single white cel, before the attached thread is pulled through the wound with deliberate, smooth motion animated on ones, the tension in the skin and the slight pull of the flesh captured in excruciating, hand-drawn detail.

    overrides:
      frames: 45

  - title: CH15-Clip0016 — Locked Down Up Face Narrator
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A locked-down, low-angle close-up shot is framed on the face of The Narrator, who is designed with the physical archetype of a hollowed-out manikin, his dolichocephalic head shape and gaunt, sunken cheeks rendered in BOLD BLACK INK OUTLINES. He lies supine on a medical table, his sweaty skin catching a single BRILLIANT HIGHLIGHT from an overhead surgical lamp that casts his features in oppressive, hard-edged DEEP BLACKS. An out-of-focus doctor in the mid-ground, a figure of flat-colored cels in a white lab coat, meticulously probes his mouth with an ink-lined steel dental tool. In the DENSELY DETAILED PAINTED BACKGROUND, a reflection in a sterile glass panel reveals Tyler Durden, designed with the predatory charisma of a lean wolf and constructed on a sharply triangular model with prominent cheekbones. He sits observing, a coolly desaturated figure in his iconic TYLERS RED LEATHER JACKET, his form slightly blurred to simulate a shallow depth of field. The entire scene is bathed in a sickly cyan fluorescent glow achieved with GRADIENT AIRBRUSHING, which catches the glint of meticulously drawn surgical instruments on a tray and the grime in the cracks of the tiled wall, creating a cold, clinical atmosphere.

    overrides:
