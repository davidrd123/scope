  - title: CH15-Clip0007 — Shoulder Narrator Whose Head Shoulders
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      An over-the-shoulder medium shot is framed from behind The Narrator, whose head and shoulders, drawn with BOLD BLACK INK OUTLINES, occupy the foreground left. The Narrator is designed with the physical archetype of a hollowed-out manikin, constructed on a soft, unremarkable ovoid model with a weak jawline. The focus is on a SPACE MONKEY waiter standing right of center, his face a mask of bruised resolve. This SPACE MONKEY is designed as a loyal but broken soldier, built on a gaunt, elongated facial structure with deep-set eyes and a bandaged nose rendered in FLAT-COLORED CELS. He is held in a locked-down frame against a DENSELY DETAILED PAINTED BACKGROUND of a corporate atrium, where sickly green steel geometry and glass are sliced by the diagonal slash of a glowing red neon tube. This harsh light source casts BRILLIANT HIGHLIGHTS on the waiter's sweaty brow and throws the lines of his face into DEEP BLACKS, creating oppressive, hard-edged shadows. For a long beat, his posture is rigid, animated on twos to convey an unsettling stillness, before he executes a smooth, deliberate turn and exits frame right, his form leaving subtle MOTION BLUR LINES against the complex background.

    overrides:
