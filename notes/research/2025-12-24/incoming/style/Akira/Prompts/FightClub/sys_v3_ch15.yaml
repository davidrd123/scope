  - title: CH15-Clip0017 — Static Up Tightly Corroded Brass
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A static close-up shot is tightly framed on a corroded brass faucet jutting from the DENSELY DETAILED PAINTED BACKGROUND of a grimy, water-stained wall inside THE PAPER STREET HOUSE. The lighting is harsh and singular, coming from above to cast DEEP BLACKS and create sharp, BRILLIANT HIGHLIGHTS on the wet, tarnished metal. From the right of the frame, a hand drawn with BOLD BLACK INK OUTLINES and filled with FLAT-COLORED CELS of a pale, sickly flesh tone enters holding a toothbrush. A steady, unbroken stream of thick, opaque brown liquid pours from the tap, animated as a viscous fluid. The hand thrusts the toothbrush into the stream, moving it back and forth in a rapid, jittery motion that is animated on ones, leaving behind distorted SMEAR FRAMES and faint MOTION BLUR LINES that cut through the filthy water. After a moment, the hand quickly retracts, exiting the frame and leaving only the continuous, disgusting flow against the decaying backdrop.

    overrides:
      frames: 29

  - title: CH15-Clip0018 — Up Profile Narrator He Aggressively
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A medium close-up is framed in profile on The Narrator as he aggressively brushes his teeth, his face a mess of bruises and a crude bandage rendered in FLAT-COLORED CELS. He is designed with the physical archetype of a **hollowed-out manikin**, constructed with a dolichocephalic (long and narrow) head shape and gaunt, sunken cheeks, all defined by BOLD BLACK INK OUTLINES. The DENSELY DETAILED PAINTED BACKGROUND of THE PAPER STREET HOUSE bathroom is lost in oppressive, DEEP BLACKS, with a single bare bulb off-screen casting BRILLIANT HIGHLIGHTS on his sweaty skin. HARD CUT to an over-the-shoulder shot of Tyler Durden, shirtless in a filthy, candle-lit bathroom corner. Tyler is designed with the predatory charisma of a **lean wolf**, his head constructed on a sharply triangular model with prominent cheekbones. The flickering candlelight creates moving, hard-edged shadows across his defined back muscles, each ripple animated on ones. A rapid sequence of HARD CUTS bounces between them as they speak, preserving the jarring rhythm. The Narrator stops brushing, his expression shifting from pained effort to dawning horror as he leans over and spits. A QUICK ZOOM follows a single, bloody tooth, an opaque hand-drawn cel, as it arcs through the air with MOTION BLUR LINES and lands in his palm with a wet smack, punctuated by a simulated CAMERA SHAKE. As The Narrator stares at the tooth, Tyler's reflection materializes in the grimy mirror behind him, stepping out of the shadows with a cigarette dangling from his lips, its ember glowing with GRADIENT AIRBRUSHING and leaving faint trails of OPAQUE PAINTED SMOKE PLUMES. Tyler turns and walks away from the mirror, his animated form receding into the darkness of THE PAPER STREET HOUSE.

    overrides:
      frames: 81

  - title: CH15-Clip0019 — Static Top Down Locked Bathroom
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A static high-angle top-down shot is locked onto a bathroom sink within THE PAPER STREET HOUSE, a masterpiece of decay rendered as a DENSELY DETAILED PAINTED object. The porcelain basin, defined by BOLD BLACK INK OUTLINES, is a web of hairline cracks and faded floral patterns nearly obscured by layers of grime and soap scum, all rendered with fine-lined ink work and a sickly, desaturated color palette. Two tarnished brass faucets jut into the top of the frame, their metallic surfaces catching a single, harsh light source that creates BRILLIANT HIGHLIGHTS against the surrounding filth. From the right faucet, a continuous stream of dirty brown water, animated as a flat-colored cel of sickening ochre, pours into the basin, its impact creating tiny, hand-drawn splash cels that ripple outwards for a few frames. The oppressive lighting casts the drain into an abyss of DEEP BLACKS, emphasizing the utter squalor of the environment.

    overrides:
      frames: 13

  - title: CH15-Clip0020 — Locked Down Extreme Up Direct
