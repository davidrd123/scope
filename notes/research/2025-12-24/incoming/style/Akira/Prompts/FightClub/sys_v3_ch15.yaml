jobs:
  - title: CH15-Clip0001 — Tight Up Locked Face Narrator
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A tight close-up is locked on the face of The Narrator, designed with the physical archetype of a hollowed-out manikin and constructed on a dolichocephalic head shape with gaunt, sunken cheeks. His face is rendered in FLAT-COLORED CELS with BOLD BLACK INK OUTLINES, catching BRILLIANT HIGHLIGHTS on his sweaty skin and thin-rimmed glasses from an unseen monitor's glow, which is rendered with soft GRADIENT AIRBRUSHING against a background of oppressive DEEP BLACKS. A hard cut shifts the composition to a static medium shot of three men seated in a row, their bodies angled towards the same off-screen light source. The DENSELY DETAILED PAINTED BACKGROUND is a sterile, dark corporate room defined by fine-lined ink work on ventilation grilles swallowed by shadow. The men are rendered with the same sickly, desaturated color palette, their faces carved by hard-edged shadows as the central figure, a severe-looking executive, leans forward with a pinched expression, his gaze fixed with an intensity animated on twos.

    overrides:
      frames: 33

  - title: CH15-Clip0002 — Tight Up Face Narrator Who
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A tight close-up shot is framed on the face of The Narrator, who is designed with the physical archetype of a hollowed-out manikin, constructed on a dolichocephalic (long and narrow) head shape with gaunt, sunken cheeks. His features are rendered in BOLD BLACK INK OUTLINES and filled with sickly, desaturated FLAT-COLORED CELS, a deep purple bruise blooming under one eye. A harsh, singular overhead light source casts BRILLIANT HIGHLIGHTS on his sweaty forehead and creates DEEP BLACKS in his eye sockets, plunging the background into an oppressive void. He holds a subtle, knowing smirk as his eyes shift slowly to the side, his head dipping slightly in a weary motion animated on twos. A HARD CUT transitions to a high-angle wide shot overlooking a rain-slicked back alley at night, a DENSELY DETAILED PAINTED BACKGROUND of cracked asphalt, rusted corrugated metal walls, and urban decay. The scene is illuminated by the cold, cyan glow of flickering fluorescent lights, their buzz rendered as a subtle GRADIENT AIRBRUSHING haze, while distant city lights are reduced to SOFT BOKEH circles. From the bottom of the frame, two small figures emerge: The Narrator, and Tyler Durden, who is designed with the predatory charisma of a lean wolf, his head constructed on a sharply triangular model with prominent cheekbones, his iconic TYLERS RED LEATHER JACKET a slash of defiant color in the gloom. As they walk towards a dilapidated bar entrance, the camera begins a slow, continuous MULTI-LAYER PARALLAX TILT upwards, revealing more of the oppressive cityscape and its towering, skeletal structures against the polluted night sky.

    overrides:
      frames: 81

  - title: CH15-Clip0003 — Continuous Follows Tyler Durden Right
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A continuous TRACKING SHOT follows from behind Tyler Durden on the right and The Narrator on the left as they walk from a rain-slicked parking lot into a dingy bar. Tyler is designed with the predatory charisma of a lean wolf, his form constructed on a sharply triangular model with prominent cheekbones and a precise jawline; his iconic TYLERS RED LEATHER JACKET is a field of flat crimson cel paint that catches BRILLIANT HIGHLIGHTS from overhead fluorescent lights. The Narrator is designed with the physical archetype of a hollowed-out manikin, built on a dolichocephalic head shape with gaunt, sunken cheeks and tired eyes, his form rendered in muted, FLAT-COLORED CELS. They move through a DENSELY DETAILED PAINTED BACKGROUND of a grimy, sickly green bar, the air thick with GRADIENT AIRBRUSHING to simulate haze and cigarette smoke, passing other patrons drawn with BOLD BLACK INK OUTLINES who linger in pools of DEEP BLACK shadow. The shot follows them past a barman and through a doorway marked by a flickering red neon sign, descending into an oppressive, subterranean darkness where the camera continues its TRACKING SHOT, finally revealing a cavernous, concrete basement. A low-angle shot frames Tyler from behind as he steps into the center of a circle of men, his silhouette stark against the out-of-focus crowd rendered as SOFT BOKEH shapes and faces caught in harsh top-lighting. A hard cut to an extreme close-up on Tyler's face, a bead of sweat catching a BRILLIANT HIGHLIGHT as it traces a path through dirt on his cheek, his lips moving with precise animation. The camera then cuts through a rapid sequence of the assembled members of PROJECT MAYHEM, their faces a gallery of bruised but attentive FLAT-COLORED CELS, before a hard cut to a high-angle shot shows a man falling down a flight of stairs into the darkness. A final hard cut reveals the basement transformed into a raw fighting pit; a montage of brutal combat erupts, animated on ones with gritty, distorted SMEAR FRAMES and MOTION BLUR LINES trailing fists and feet. Every blow is punctuated by stark white IMPACT FRAMES and simulated CAMERA SHAKE, sending opaque, hand-drawn blood splatter cels across the screen. The sequence climaxes with a low-angle wide shot of two shirtless fighters grappling, their muscles defined by hard-edged shadows, surrounded by the cheering, silhouetted crowd before a final, brutal takedown is shown in a flurry of high-speed animation.

    overrides:
      frames: 81

  - title: CH15-Clip0004 — Locked Down Up Right Side
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A locked-down close-up is framed on the right side of the screen, focusing on The Narrator, who is designed with the physical archetype of a hollowed-out manikin, constructed on a dolichocephalic head shape with gaunt, sunken cheeks. His face, rendered in BOLD BLACK INK OUTLINES and sickly FLAT-COLORED CELS, is cast in the oppressive glow of overhead fluorescent lights, creating BRILLIANT HIGHLIGHTS on his clammy skin and DEEP BLACKS under his eyes. The shot executes a slow ANIMATED RACK FOCUS; The Narrator's sharp features dissolve into SOFT BOKEH circles as the focus pulls deep into the DENSELY DETAILED PAINTED BACKGROUND, a sterile office labyrinth of beige cubicles, humming CRT monitors, and stacks of paper, all rendered with fine-lined ink work and a wash of desaturated green. A SPACE MONKEY, his face bruised with a dark purple shiner, comes into sharp focus, pushing a mail cart directly toward the camera. A slow TRACKING SHOT follows his movement, creating a MULTI-LAYER PARALLAX effect as rows of cubicles and other office drones slide past at varying speeds. As he passes the camera and moves out of frame to the left, leaving behind subtle MOTION BLUR LINES, the focus racks back with mechanical precision to the now sharp, isolated face of The Narrator.

    overrides:
      frames: 81

  - title: CH15-Clip0005 — Shoulder Narrator His Head Shoulders
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      An over-the-shoulder medium shot is framed from behind The Narrator, his head and shoulders rendered with BOLD BLACK INK OUTLINES occupying the left foreground, as a continuous TRACKING SHOT slowly pushes in. The initial focus is deep in a DENSELY DETAILED PAINTED BACKGROUND depicting a corporate atrium patio at night, where distant neon lights are rendered as SOFT BOKEH circles and the architecture is a cold grid of ink-lined steel. A waiter, a member of PROJECT MAYHEM, walks with a steady, deliberate gait directly toward the camera, his form a blurry cel moving through layers of painted restaurant patrons in a MULTI-LAYER PARALLAX effect. As he approaches The Narrator's table, an ANIMATED RACK FOCUS snaps him into sharp clarity, revealing a SPACE MONKEY designed with the physical archetype of a **starved hunting dog**; his face is constructed on a long, rectangular model with hollowed-out cheeks, sunken eyes, and a sharp jawline. His uniform is composed of FLAT-COLORED CELS, while the injuries on his face—a stark white bandage on his forehead, another on his nose, and a sickly purple bruise under one eye—are rendered with graphic simplicity. He stops, looking down with a quiet intensity, his face caught in a harsh top-down light that casts DEEP BLACKS into his eye sockets and creates BRILLIANT HIGHLIGHTS on his brow, confirming his allegiance with a subtle, knowing smirk.

