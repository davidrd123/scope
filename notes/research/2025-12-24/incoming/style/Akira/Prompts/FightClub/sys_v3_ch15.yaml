      frames: 81

  - title: CH15-Clip0006 — Shoulder Tyler Durden Whose Head
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      An over-the-shoulder medium shot is framed from behind Tyler Durden, whose head and shoulder occupy the right foreground, looking down at The Narrator seated at a small cafe table. The focus is locked on The Narrator, designed with the physical archetype of a **hollowed-out manikin** built on a dolichocephalic head shape with gaunt, sunken cheeks. His face is drawn with BOLD BLACK INK OUTLINES and filled with sickly, FLAT-COLORED CELS, a dark, jagged gash inked above one eyebrow. His eyes are concealed by dark sunglasses that catch a single, sharp BRILLIANT HIGHLIGHT, reflecting the overcast sky. The shot is held static, emphasizing the tension in his jawline with hard-edged shadows rendered in DEEP BLACKS as he speaks. The DENSELY DETAILED PAINTED BACKGROUND depicts a patio of cracked, grimy paving stones and the stained marble surface of the table, capturing a mood of urban decay under the flat, oppressive light.

