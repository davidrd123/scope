      frames: 21

  - title: CH19-Clip0015 — Extreme Up Locked Back Hand
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      An extreme close-up is locked on the back of the hand of The Narrator, filling the entire frame against a background of pure, oppressive DEEP BLACKS. The Narrator is designed with the physical archetype of a **hollowed-out manikin**, constructed on a soft, ovoid model with unremarkable features, and his hand here is rendered with BOLD BLACK INK OUTLINES and a pale, FLAT-COLORED CEL that glistens with moisture, captured by a harsh singular light source creating BRILLIANT HIGHLIGHTS. Fine, white lye powder particles, each individually animated, cascade onto the skin and a chemical reaction is immediately animated on ones, with tiny, hand-drawn bubbles erupting across the surface in a fizzing, corrosive foam. Each popping blister releases a tiny, OPAQUE PAINTED SMOKE PLUME, a wisp of caustic steam rendered with subtle GRADIENT AIRBRUSHING. The flat cel color of the skin begins to mottle with angry red patches as the burn deepens, the ink outlines of the veins below becoming more prominent as the hand’s involuntary clench is conveyed through subtle, high-frame-rate muscle twitches and the tightening of tendons, each frame meticulously drawn to show the escalating agony as the flesh bubbles and chars.
