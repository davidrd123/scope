  - title: CH19-Clip0012 — Shoulder Tyler Durden His Garishly
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      An over-the-shoulder medium shot is framed from behind Tyler Durden, his garishly patterned shirt a mass of FLAT-COLORED CELS occupying the right foreground, as the focus remains locked on The Narrator leaning forward left of center. The Narrator is designed with the physical archetype of a **hollowed-out manikin**, constructed with a dolichocephalic head shape and gaunt, sunken cheeks defined by BOLD BLACK INK OUTLINES. A singular, harsh light source off-screen casts BRILLIANT HIGHLIGHTS across his sweaty forehead and cheekbones, while plunging the rest of his form and the DENSELY DETAILED PAINTED BACKGROUND into oppressive DEEP BLACKS. Tyler is designed with the predatory charisma of a **lean wolf**, his presence felt even from behind. As The Narrator's desperate plea turns to a snarl, his body tenses and then launches forward in a burst of motion animated on ones, his form distorting into gritty SMEAR FRAMES that leave trailing MOTION BLUR LINES. The lunge is instantly met with an unseen counter, punctuated by a single, stark white IMPACT FRAME that flashes across the screen as violent, hand-drawn CAMERA SHAKE jitters the entire cel stack for a split second before a hard cut to absolute black.
