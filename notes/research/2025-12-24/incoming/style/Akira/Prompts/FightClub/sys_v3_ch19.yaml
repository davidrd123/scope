jobs:
  - title: CH19-Clip0001 — Follows Tyler Durden Left Right
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A medium TRACKING SHOT follows Tyler Durden from left to right, his form rendered in BOLD BLACK INK OUTLINES and FLAT-COLORED CELS. Tyler is designed with the predatory charisma of a lean wolf, constructed on a sharply triangular model with prominent cheekbones; his gaudy shirt is a pattern of sickly autumn leaves, and a single harsh light source creates BRILLIANT HIGHLIGHTS on his sweaty skin. As his shoulder moves past the frame, a sharp ANIMATED RACK FOCUS shifts the focal plane, revealing The Narrator standing motionless in the background. The Narrator is designed with the physical archetype of a hollowed-out manikin, his face built on a dolichocephalic (long and narrow) head shape with gaunt, sunken cheeks and deep-set eyes lost in shadow. He is frozen in place, his body half-turned and illuminated by a single, overhanging lamp that casts DEEP BLACKS across the DENSELY DETAILED PAINTED BACKGROUND of THE PAPER STREET HOUSE kitchen, a chaotic scene of grime, chemical bottles, and exposed pipes rendered with visible, fine-lined ink work.
    overrides:
      frames: 65

  - title: CH19-Clip0002 — Locked Down Two Narrator Left
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A locked-down medium two-shot is framed with The Narrator on the left in profile and Tyler Durden positioned right of center behind a cluttered kitchen counter. The Narrator, designed with the physical archetype of a **hollowed-out manikin** and constructed from soft, ovoid shapes with wide, perpetually anxious eyes, stands with his head bowed, his form defined by BOLD BLACK INK OUTLINES and rendered in FLAT-COLORED CELS of sickly grey. Tyler Durden, designed with the predatory charisma of a **lean wolf** built on a sharply triangular model with prominent cheekbones, is bathed in a harsh, singular overhead light from a cluster of bare bulbs. This light source casts DEEP BLACKS and hard-edged shadows across the DENSELY DETAILED PAINTED BACKGROUND of THE PAPER STREET HOUSE kitchen, illuminating peeling paint, grimy pipes, and chemical bottles with fine-lined ink work. BRILLIANT HIGHLIGHTS gleam on Tyler's sweaty skin and his garish, flat-colored shirt as he slowly and deliberately pulls a thick, black rubber glove onto his right hand, the material stretching with a slick animated sheen. The Narrator looks up from the floor, his movement stiff and animated on twos, meeting Tyler’s gaze just as Tyler finishes with the glove and looks up, his face a mask of high-contrast shadow and intense focus.
    overrides:
      frames: 81

  - title: CH19-Clip0003 — Shoulder Figure Right Focusing Narrator
