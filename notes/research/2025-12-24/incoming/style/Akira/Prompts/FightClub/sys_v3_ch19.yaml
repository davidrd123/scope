      frames: 49

  - title: CH19-Clip0009 — Shoulder Tyler Durden His Out
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      An over-the-shoulder medium shot is framed from behind Tyler Durden, his out-of-focus shoulder dominating the right foreground, locking focus on The Narrator kneeling on the left in abject terror. The Narrator is designed with the physical archetype of a **hollowed-out manikin**, constructed on a dolichocephalic head shape with gaunt, sunken cheeks; his features are drawn with BOLD BLACK INK OUTLINES and filled with sickly, desaturated FLAT-COLORED CELS. His face, contorted in a silent scream, is slicked with sweat rendered as BRILLIANT HIGHLIGHTS from a single, harsh overhead light source that casts DEEP BLACKS into the sockets of his eyes. The scene is set against a DENSELY DETAILED PAINTED BACKGROUND of THE PAPER STREET HOUSE basement, where cracked concrete and weeping pipes are rendered with fine-lined ink work. A hard cut snaps to an extreme close-up of Tyler's black leather-gloved hand pressing The Narrator's hand flat against a surface, the caustic lye mixture bubbling violently on his skin, animated on ones with rising OPAQUE PAINTED SMOKE PLUMES and blistering flesh cels. Another hard cut returns to The Narrator's face, his mouth now wide open in an audible shriek, the animation capturing the violent trembling of his jaw as the oppressive shadows threaten to consume him entirely.
    overrides:
      frames: 69

  - title: CH19-Clip0010 — Locked Down Establishes Deep Oppressive
    prompt: |
      1980s Cel Animation Blueprint: Fight Club
      A locked-down wide shot establishes a deep, oppressive forest, rendered as a DENSELY DETAILED PAINTED BACKGROUND where every leaf and piece of bark is articulated with fine-lined ink work. Towering, skeletal trees drawn with BOLD BLACK INK OUTLINES rise vertically, their forms filled with desaturated, sickly green and muddy brown FLAT-COLORED CELS, creating a claustrophobic cage of natural forms. The immense depth of the static frame is achieved through a subtle MULTI-LAYER PARALLAX effect, with foreground branches slightly out of focus and the background receding into an inky blackness. A faint, ethereal light filters down from an unseen canopy, rendered as soft GRADIENT AIRBRUSHING, casting BRILLIANT HIGHLIGHTS on patches of damp undergrowth while plunging the areas behind the thick tree trunks into pools of DEEP BLACKS and hard-edged shadow. The atmosphere is thick with a painted haze, a visual representation of The Narrator's internal, meditative space, unsettlingly still and devoid of life.
