      1980s Cel Animation Blueprint: Fight Club
      An over-the-shoulder medium shot is framed from behind Tyler Durden's silhouetted head, focusing on The Narrator as he recoils from a chemical burn, his face contorting in agony with distorted SMEAR FRAMES. The Narrator is designed with the physical archetype of a hollowed-out manikin, built on a dolichocephalic head shape with gaunt, sunken cheeks, his entire form rendered in FLAT-COLORED CELS. A HARD CUT immediately widens the frame to a medium two-shot, revealing Tyler Durden sitting opposite him, designed with the predatory charisma of a lean wolf and constructed on a sharply triangular model with prominent cheekbones. They are inside THE PAPER STREET HOUSE, captured in a DENSELY DETAILED PAINTED BACKGROUND of peeling wallpaper, exposed pipes, and cluttered soap-making equipment for PAPER STREET SOAP CO., all rendered with visible, fine-lined ink work and a sickly color palette. The scene is lit by a single harsh light source, casting DEEP BLACKS and creating BRILLIANT HIGHLIGHTS on sweaty skin. A second HARD CUT punches into an extreme close-up of The Narrator's hand, where the flesh bubbles and chars, emitting thin, hand-drawn OPAQUE PAINTED SMOKE PLUMES. A final HARD CUT snaps to a close-up on Tyler, his expression a mask of cold instruction, his face defined by BOLD BLACK INK OUTLINES and the reflection of the room distorted across his oversized safety glasses.
