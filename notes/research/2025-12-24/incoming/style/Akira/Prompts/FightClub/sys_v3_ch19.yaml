      1980s Cel Animation Blueprint: Fight Club
      A locked-down medium shot is framed in profile, capturing a tense confrontation across a cluttered counter inside THE PAPER STREET HOUSE. On the left, The Narrator is seated, hunched forward, designed with the physical archetype of a hollowed-out manikin; his construction is based on a nondescript, ovoid head shape with wide, anxious eyes rendered with BOLD BLACK INK OUTLINES. Leaning aggressively over the counter from the right is Tyler Durden, designed with the predatory charisma of a lean wolf and constructed on a sharply triangular model with a strong jaw and spiky, ink-flicked hair. His loud floral shirt is a chaotic pattern of FLAT-COLORED CELS against the scene's sickly, desaturated color palette. The DENSELY DETAILED PAINTED BACKGROUND is a chaotic mess of soap-making equipment, with beakers, tubs, and a metal bowl filled with pink, half-formed bars of PAPER STREET SOAP CO., all rendered with fine-lined ink work capturing layers of grime. A single, harsh light source from off-screen right carves out the scene, casting DEEP BLACKS and creating hard-edged shadows while catching BRILLIANT HIGHLIGHTS on the sweat on Tyler’s brow and the side of The Narrator's face, with GRADIENT AIRBRUSHING used for dust motes hanging in the oppressive air. As Tyler speaks with sharp, intense gestures animated on ones, The Narrator flinches back subtly, his movement animated on twos to emphasize his nervous hesitation.
